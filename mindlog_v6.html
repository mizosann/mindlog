<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MindLog</title>
<style>
:root{
  --g50:#f0faf4;--g100:#d6f0e0;--g200:#aaddc2;--g300:#6dc49c;
  --g400:#3aaa77;--g500:#1f8f5e;--g600:#157249;--g700:#0e5535;
  --n0:#fff;--n50:#f8f9f8;--n100:#eef0ed;--n200:#dde0db;
  --n300:#bcc0b9;--n400:#8f9490;--n500:#646a65;--n600:#434845;--n700:#2b2f2c;
  --bg:var(--n50);--surface:var(--n0);--border:var(--n200);--border2:var(--n100);
  --text:var(--n700);--text2:var(--n500);--text3:var(--n400);
  --accent:var(--g500);--accent-bg:var(--g50);--accent-bd:var(--g200);
  --morning:#e07c2a;--morning-bg:#fff7ee;--morning-bd:#f5d4b0;
  --evening:#2a7ec0;--evening-bg:#eff6ff;--evening-bd:#b3d4f0;
  --fact-c:#2a7ec0;--interp-c:#9b4dca;--interp-bg:#f8f0ff;--interp-bd:#d8b4f0;
  --ai:#7c3aed;--ai-bg:#faf5ff;--ai-bd:#ddd6fe;--ai-text:#5b21b6;
  --session:#0f766e;--session-bg:#f0fdfa;--session-bd:#99f6e4;
  --r:6px;--rl:10px;--rll:14px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 12px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);
  --sh3:0 12px 40px rgba(0,0,0,.10),0 2px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--n200);border-radius:2px;}

/* ── LOGIN ── */
#screen-login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,var(--g50) 0%,var(--n50) 60%,#f0f0ff 100%);}
.lw{width:100%;max-width:400px;padding:20px;}
.ll{text-align:center;margin-bottom:28px;}
.lm{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--g500),var(--g300));margin-bottom:10px;box-shadow:0 6px 20px rgba(31,143,94,.3);}
.lm svg{width:26px;height:26px;fill:white;}
.lb{font-size:28px;font-weight:700;color:var(--g700);}
.lt{font-size:12px;color:var(--text3);margin-top:2px;}
.lc{background:var(--surface);border-radius:var(--rll);padding:28px;box-shadow:var(--sh3);border:1px solid var(--border2);}
.lct{font-size:16px;font-weight:700;margin-bottom:20px;}
.lf{margin-bottom:13px;}
.lfl{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:4px;}
.lfi{width:100%;padding:10px 13px;background:var(--n50);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-family:inherit;transition:border-color .18s;}
.lfi:focus{outline:none;border-color:var(--accent);background:var(--surface);}
.lerr{font-size:12px;color:#c0392b;margin-top:6px;display:none;padding:7px 10px;background:#fff5f5;border-radius:var(--r);border:1px solid #fcccc8;}
.lbtn{width:100%;padding:12px;margin-top:6px;background:var(--g500);color:white;border:none;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:background .18s;}
.lbtn:hover{background:var(--g600);}
.lbtn:disabled{opacity:.6;cursor:not-allowed;}
.lnew{text-align:center;margin-top:12px;}
.lnew button{background:none;border:none;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;text-decoration:underline;}

/* ── REGISTER ── */
#screen-register{display:none;position:fixed;inset:0;background:linear-gradient(160deg,var(--g50),var(--n50));align-items:center;justify-content:center;z-index:100;overflow-y:auto;padding:20px;}
#screen-register.open{display:flex;}

/* ── APP ── */
#screen-app{display:none;}
.app{display:flex;min-height:100vh;}

/* SIDEBAR */
.sb{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sbh{padding:18px 18px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px;}
.sbhm{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--g500),var(--g300));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sbhm svg{width:16px;height:16px;fill:white;}
.sbhb{font-size:19px;font-weight:700;color:var(--g700);}
.sbu{padding:12px 14px;margin:8px 8px 0;background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:var(--rl);}
.sbun{font-size:14px;font-weight:700;}
.sbur{font-size:11px;font-weight:500;margin-top:2px;}
.rc{color:var(--g600);}
.rl{color:var(--morning);}
.sbn{flex:1;padding:12px 0;}
.sbs{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:10px 18px 4px;}
.sbi{display:flex;align-items:center;gap:8px;padding:8px 18px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;border-left:2.5px solid transparent;margin:1px 0;}
.sbi:hover{color:var(--text);background:var(--n50);}
.sbi.active{color:var(--accent);font-weight:700;background:var(--accent-bg);border-left-color:var(--accent);}
.sbbt{padding:10px 8px;border-top:1px solid var(--border2);}
.lout{width:100%;padding:8px;border-radius:var(--r);background:transparent;border:1px solid var(--border);color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer;transition:all .18s;}
.lout:hover{border-color:#c0392b;color:#c0392b;background:#fff5f5;}

/* MAIN */
.main{flex:1;overflow-y:auto;min-width:0;}
.mi{padding:24px 28px 80px;max-width:920px;}

/* COMMON */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.pht{font-size:24px;font-weight:700;color:var(--text);}
.phs{font-size:12px;color:var(--text3);margin-top:3px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden;}
.ch{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border2);background:var(--n50);}
.cht{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;}
.cd{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cb{padding:16px 18px;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.bm{background:var(--morning-bg);color:var(--morning);border:1px solid var(--morning-bd);}
.be{background:var(--evening-bg);color:var(--evening);border:1px solid var(--evening-bd);}
.bg{background:var(--g100);color:var(--g600);border:1px solid var(--g200);}
.ba{background:var(--ai-bg);color:var(--ai-text);border:1px solid var(--ai-bd);}
.theme-box{background:linear-gradient(135deg,var(--g50),#fff);border:1px solid var(--accent-bd);border-radius:var(--rl);padding:14px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;}
.thi{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--g500),var(--g300));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.thi svg{width:16px;height:16px;fill:white;}
.thl{font-size:10px;font-weight:700;color:var(--g600);letter-spacing:.05em;margin-bottom:3px;}
.tht{font-size:14px;font-weight:700;color:var(--g800);line-height:1.4;}
.field{margin-bottom:14px;}
.fl{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--text2);margin-bottom:4px;}
.fh{font-size:12px;color:var(--text3);margin-bottom:6px;line-height:1.5;}
textarea,input[type=text],input[type=password],input[type=date]{width:100%;padding:9px 12px;background:var(--n50);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:13px;line-height:1.8;resize:vertical;transition:border-color .18s;}
textarea:focus,input:focus{outline:none;background:var(--surface);border-color:var(--accent);}
.fm:focus{border-color:var(--morning);}
.ff:focus{border-color:var(--fact-c);}
.fi:focus{border-color:var(--interp-c);}
.mrow{display:flex;align-items:center;gap:10px;padding:10px 0 2px;border-top:1px solid var(--border2);}
.mlb{font-size:12px;font-weight:700;color:var(--text2);white-space:nowrap;}
.mem{font-size:20px;width:26px;text-align:center;}
.mtr{flex:1;}
input[type=range]{width:100%;-webkit-appearance:none;height:5px;background:var(--n200);border-radius:3px;cursor:pointer;border:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 3px rgba(31,143,94,.15);}
.mv{font-family:monospace;font-size:12px;color:var(--text2);width:30px;text-align:center;}
.div{height:1px;background:var(--border2);margin:12px 0;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .18s;}
.btn-g{background:var(--g500);color:white;}.btn-g:hover{background:var(--g600);}
.btn-m{background:var(--morning);color:white;}.btn-m:hover{filter:brightness(.9);}
.btn-a{background:var(--ai);color:white;}.btn-a:hover{background:#6d28d9;}
.btn-s{background:var(--session);color:white;}.btn-s:hover{background:#0d6460;}
.btn-gh{background:transparent;color:var(--text2);border:1px solid var(--border);}.btn-gh:hover{background:var(--n50);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-xs{padding:3px 9px;font-size:11px;}
.br{display:flex;justify-content:flex-end;gap:8px;padding-top:8px;}
.sr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
.sline{flex:1;height:1px;background:var(--border2);}
.mbar{width:50px;height:4px;background:var(--n200);border-radius:2px;overflow:hidden;}
.mfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--g300),var(--g500));}
.dr{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text3);padding-top:6px;border-top:1px solid var(--border2);margin-top:6px;flex-wrap:wrap;}
.es{background:var(--n50);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;}
.esl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;}
.est{font-size:13px;line-height:1.8;color:var(--text2);}
.ec{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:8px;box-shadow:var(--sh);overflow:hidden;transition:box-shadow .18s;}
.ec:hover{box-shadow:var(--sh2);}
.ech{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;transition:background .15s;}
.ech:hover{background:var(--n50);}
.echl{display:flex;align-items:center;gap:8px;}
.ecd{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dm{background:var(--morning);}
.de{background:var(--evening);}
.db{background:var(--accent);}
.ecd2{font-size:13px;font-weight:700;}
.ectg{display:flex;gap:4px;}
.ecb{padding:4px 14px 14px;display:grid;gap:7px;}
.ec.collapsed .ecb{display:none;}
.ctabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.ctab{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;background:var(--surface);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;transition:all .18s;}
.ctab:hover{border-color:var(--accent-bd);color:var(--text);}
.ctab.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:700;}
.pbar{display:flex;align-items:center;gap:8px;padding:9px 12px;margin-bottom:14px;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);font-size:12px;color:var(--g600);font-weight:500;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;box-shadow:var(--sh);}
.stl{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500;}
.stv{font-size:26px;font-weight:700;line-height:1;color:var(--accent);}
.sts{font-size:11px;color:var(--text3);margin-top:3px;}
.ring-svg{display:block;overflow:visible;}
.ring-bg{fill:none;stroke:var(--n200);stroke-width:5;}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;}
.rdt{font-family:monospace;font-size:14px;fill:var(--text);}
.rut{font-size:9px;fill:var(--text3);}

/* AI panel */
.aip{background:var(--ai-bg);border:1.5px solid var(--ai-bd);border-radius:var(--rl);margin-bottom:14px;overflow:hidden;}
.aiph{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(135deg,#ede9fe,var(--ai-bg));border-bottom:1px solid var(--ai-bd);}
.aipt{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ai-text);}
.ais{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--ai),#a855f7);display:flex;align-items:center;justify-content:center;}
.ais svg{width:14px;height:14px;fill:white;}
.aibg{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:linear-gradient(135deg,var(--ai),#a855f7);color:white;letter-spacing:.05em;}
.aib{padding:18px;}
.agen{display:flex;align-items:center;gap:12px;padding:20px;}
.adts{display:flex;gap:5px;}
.adt{width:7px;height:7px;border-radius:50%;background:var(--ai);animation:bounce 1.2s infinite;}
.adt:nth-child(2){animation-delay:.2s;}.adt:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.agt{font-size:13px;color:var(--ai-text);font-weight:500;}
.asec{margin-bottom:18px;}
.asec:last-child{margin-bottom:0;}
.asect{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ai-text);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--ai-bd);}
.aico{font-size:14px;}
.icard{background:white;border:1px solid var(--ai-bd);border-radius:var(--r);padding:12px 14px;border-left:4px solid var(--ai);margin-bottom:8px;}
.ict{font-size:13px;font-weight:700;color:var(--ai-text);margin-bottom:4px;}
.icb{font-size:13px;color:var(--text2);line-height:1.7;}
.ice{margin-top:8px;padding:6px 10px;background:var(--ai-bg);border-radius:var(--r);font-size:12px;color:var(--text3);border-left:3px solid var(--ai-bd);font-style:italic;}
.wsq{background:white;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
.wsn{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--ai),#a855f7);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.wsqt{font-size:13px;color:var(--text);line-height:1.7;font-weight:500;}
.wsqi{font-size:12px;color:var(--text3);margin-top:3px;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.si{background:white;border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;}
.sil{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.sit{font-size:13px;color:var(--text2);line-height:1.7;}
.aerr{padding:12px;background:#fff5f5;border:1px solid #fcccc8;border-radius:var(--r);font-size:13px;color:#c0392b;}

/* session */
.sesp{background:var(--session-bg);border:1.5px solid var(--session-bd);border-radius:var(--rl);margin-bottom:14px;overflow:hidden;}
.sesph{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(135deg,#ccfbf1,var(--session-bg));border-bottom:1px solid var(--session-bd);}
.sespt{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--session);}
.sesic{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--session),#0d9488);display:flex;align-items:center;justify-content:center;}
.sesic svg{width:14px;height:14px;fill:white;}
.sesbg{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--session);color:white;letter-spacing:.05em;}
.sesb{padding:16px;}
.si2{background:white;border:1px solid var(--session-bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden;}
.si2h{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;transition:background .15s;}
.si2h:hover{background:var(--session-bg);}
.si2hl{display:flex;align-items:center;gap:8px;}
.si2d{width:9px;height:9px;border-radius:50%;background:var(--session);flex-shrink:0;}
.si2dt{font-size:13px;font-weight:700;}
.si2th{font-size:12px;color:var(--text3);margin-left:3px;}
.si2bdy{padding:0 14px 14px;display:none;}
.si2bdy.open{display:block;}
.smtxt{font-size:13px;line-height:1.85;color:var(--text2);white-space:pre-wrap;background:var(--n50);border:1px solid var(--border2);border-radius:var(--r);padding:12px;margin-bottom:8px;}
.cno{width:100%;padding:8px 11px;background:var(--morning-bg);border:1.5px dashed var(--morning-bd);border-radius:var(--r);color:var(--text2);font-family:inherit;font-size:12px;line-height:1.7;resize:none;transition:all .18s;}
.cno:focus{outline:none;border-style:solid;border-color:var(--morning);background:#fff;}
.cnol{font-size:11px;font-weight:700;color:var(--morning);margin-bottom:4px;}
.sf{background:white;border:1px solid var(--session-bd);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.sft{font-size:13px;font-weight:700;color:var(--session);margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* cycle */
.cycbtns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.cyc{padding:4px 12px;border-radius:20px;font-family:monospace;font-size:11px;background:var(--surface);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;transition:all .18s;}
.cyc.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:700;}
.chc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:14px;}
.chct{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.chctt{font-size:12px;font-weight:700;color:var(--text2);}
.leg{display:flex;gap:12px;}
.lgi{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);}
.lgd{width:7px;height:7px;border-radius:50%;}
canvas{display:block;width:100%;}

/* RPG */
.rpgc{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border-radius:var(--rl);padding:18px;margin-bottom:14px;color:white;position:relative;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.3);}
.rpgc::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(124,106,247,.2),transparent 70%);pointer-events:none;}
.rpglb{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#f5a623,#e07c2a);color:white;font-weight:700;font-size:12px;padding:3px 10px;border-radius:20px;margin-bottom:7px;box-shadow:0 2px 6px rgba(245,166,35,.4);}
.rpgt{font-size:20px;font-weight:700;margin-bottom:3px;}
.rpgs{font-size:12px;opacity:.65;margin-bottom:12px;}
.rpgel{display:flex;justify-content:space-between;font-size:11px;opacity:.65;margin-bottom:3px;}
.rpgeb{height:9px;background:rgba(255,255,255,.12);border-radius:5px;overflow:hidden;}
.rpgef{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--g600),var(--g400),var(--g300));transition:width .8s cubic-bezier(.4,0,.2,1);}
.rpgsts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.rpgst{background:rgba(255,255,255,.07);border-radius:var(--r);padding:8px;text-align:center;}
.rpgstv{font-size:18px;font-weight:700;}
.rpgstl{font-size:10px;opacity:.55;margin-top:1px;}
.qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.qc.done{background:var(--g50);border-color:var(--g200);}
.qico{font-size:22px;flex-shrink:0;width:36px;text-align:center;}
.qi{flex:1;}
.qn{font-size:13px;font-weight:700;margin-bottom:2px;}
.qc.done .qn{color:var(--g600);}
.qd{font-size:12px;color:var(--text3);}
.qr{font-size:11px;font-weight:700;color:#a855f7;margin-top:2px;}
.qpb{height:3px;background:var(--n200);border-radius:2px;overflow:hidden;margin-top:4px;}
.qpbf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--g400),#a855f7);}
.qdb{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--g100);color:var(--g700);white-space:nowrap;flex-shrink:0;}

/* Calendar */
.cal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:14px;}
.calh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.calm{font-size:15px;font-weight:700;}
.calnav{display:flex;gap:6px;}
.calnb{background:var(--n50);border:1px solid var(--border);border-radius:var(--r);width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:background .15s;}
.calnb:hover{background:var(--n100);}
.cald{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.caldh{font-size:10px;color:var(--text3);text-align:center;padding:3px 0;font-weight:700;}
.caldc{aspect-ratio:1;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .15s;position:relative;}
.caldc:hover{background:var(--n100);}
.caldc.today{font-weight:700;color:var(--accent);}
.caldc.has-both{background:var(--g500);color:white;}
.caldc.has-morning{background:var(--morning);color:white;}
.caldc.has-evening{background:var(--evening);color:white;}
.caldc.other-month{opacity:.3;}
.caldc.selected{outline:2px solid var(--accent);outline-offset:1px;}
.cal-legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.cal-li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);}
.cal-dot{width:10px;height:10px;border-radius:2px;}

/* Condition */
.cond-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.cond-item{background:var(--n50);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center;}
.cond-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px;}
.cond-score{font-size:28px;font-weight:700;color:var(--accent);}
.cond-stars{display:flex;justify-content:center;gap:2px;margin-top:4px;}
.star{font-size:16px;cursor:pointer;transition:transform .1s;}
.star:hover{transform:scale(1.2);}

/* selftalk */
.stbox{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:start;}
.starrow{display:flex;align-items:center;justify-content:center;padding-top:20px;font-size:20px;color:var(--g500);}

/* message */
.msgcard{background:linear-gradient(135deg,var(--g50),#fff);border:1px solid var(--g200);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;}
.msghead{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.msgav{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--g500),var(--g300));display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;}
.msgname{font-size:13px;font-weight:700;}
.msgdate{font-size:11px;color:var(--text3);}
.msgtxt{font-size:14px;color:var(--text);line-height:1.85;white-space:pre-wrap;}

/* Growth note */
.gncard{background:linear-gradient(135deg,#fffbeb,#fff);border:1.5px solid #f5d4b0;border-radius:var(--rl);padding:16px;margin-bottom:10px;}
.gntitle{font-size:14px;font-weight:700;color:var(--morning);margin-bottom:6px;}
.gntext{font-size:14px;color:var(--text);line-height:1.85;white-space:pre-wrap;}
.gndate{font-size:11px;color:var(--text3);margin-top:6px;}

/* levelup overlay */
.luo{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);animation:luFade 3.2s forwards;}
@keyframes luFade{0%{opacity:0;}8%{opacity:1;}80%{opacity:1;}100%{opacity:0;pointer-events:none;}}
.lub{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid #f5a623;border-radius:20px;padding:36px;text-align:center;color:white;animation:luScale .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 50px rgba(245,166,35,.4);}
@keyframes luScale{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.lue{font-size:56px;margin-bottom:10px;}
.lutitle{font-size:12px;opacity:.65;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;}
.lulv{font-size:44px;font-weight:700;color:#f5a623;line-height:1;}
.luname{font-size:18px;font-weight:700;margin-top:6px;}
.luexp{font-size:12px;opacity:.55;margin-top:4px;}

/* ── ドット絵キャラ ── */
.pixel-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
.pixel-canvas{image-rendering:pixelated;image-rendering:crisp-edges;}
.char-name{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.08em;}
.char-job-badge{font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);color:white;background:rgba(255,255,255,.12);}

/* ── メンタル診断 ── */
.diag-screen{position:fixed;inset:0;background:#0f172a;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;padding:24px 20px 40px;}
.diag-screen.hidden{display:none;}
.diag-q{color:white;font-size:16px;font-weight:700;line-height:1.6;margin-bottom:20px;text-align:center;max-width:500px;}
.diag-opts{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:500px;width:100%;}
.diag-opt{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:var(--r);padding:10px 6px;color:rgba(255,255,255,.8);font-size:12px;font-family:inherit;cursor:pointer;transition:all .18s;text-align:center;}
.diag-opt:hover,.diag-opt.sel{background:rgba(99,102,241,.4);border-color:#818cf8;color:white;}
.diag-prog{width:100%;max-width:500px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-bottom:24px;}
.diag-prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#818cf8,#a855f7);transition:width .4s ease;}
.diag-qnum{color:rgba(255,255,255,.4);font-size:12px;margin-bottom:8px;}
.type-card{border-radius:var(--rl);padding:20px;margin-bottom:14px;color:white;text-align:center;}
.type-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:8px;}

/* mobile nav */
.mnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:4px 0 env(safe-area-inset-bottom);z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,.05);}
.mnavi{display:flex;justify-content:space-around;}
.mnavb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;cursor:pointer;font-size:10px;color:var(--text3);font-weight:500;border:none;background:none;min-width:46px;}
.mnavb.active{color:var(--accent);}
.mnavb span:first-child{font-size:19px;}

/* toast */
.toast{position:fixed;bottom:22px;right:20px;z-index:1000;background:var(--g700);color:white;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:var(--sh3);opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.empty{text-align:center;padding:36px;color:var(--text3);}
.ei{font-size:30px;margin-bottom:8px;}

/* offline badge */
.offline-badge{position:fixed;top:8px;left:50%;transform:translateX(-50%);background:#ef4444;color:white;font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;z-index:500;display:none;}
.offline-badge.show{display:block;}

/* save indicator */
.save-dot{width:7px;height:7px;border-radius:50%;background:var(--g400);display:inline-block;margin-left:4px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

@media(max-width:740px){
  .sb{display:none;}
  .mi{padding:16px 12px 20px;}
  .stats{grid-template-columns:1fr 1fr;}
  .sgrid{grid-template-columns:1fr;}
  .stbox{grid-template-columns:1fr;}
  .starrow{display:none;}
  .cond-grid{grid-template-columns:1fr 1fr 1fr;}
  .mnav{display:none !important;}
}
</style>
</head>

<script>
'use strict';
/* ═══════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyi3HUhX8FgZf34O0ql90xuoaXSP4l2t9G5Y3EtBgQ9aXSAru_CnQWzBmKfovEtCPbX/exec';
const INVITE_CODE_KEY = 'mindlog_invite'; // GASから動的取得

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let CU = null;        // Current User
let PAGE = 'today';
let COACH_CID = null;
let CYC = 0;
let SELECTED_DATE = null;

// Data cache
const DB = {
  clients:  {},   // {cid: {name,sport,theme,next,entries,sessions}}
  memos:    [],
  wins:     [],
  goals:    {},
  messages: [],
  gnotes:   [],   // growth notes from coach
};
const LOADED = {};  // track what's been loaded

// RPG
let _lastLevel = 0;

/* ═══════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════ */
function getToday(){
  const jst = new Date(Date.now() + 9*60*60*1000);
  return jst.toISOString().slice(0,10);
}
function fmt(d){
  if(!d) return '';
  return new Date(d+'T12:00:00').toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
}
function emo(v){ return ['','😔','😟','😕','😐','😐','🙂','😊','😄','🤩','🔥'][+v]||'😐'; }
function toast(msg){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
function toggleEC(id){ document.getElementById(id)?.classList.toggle('collapsed'); }
function toggleSI(id){ const b=document.getElementById(id); if(b) b.classList.toggle('open'); }
function updEmo(sid,eid,vid){
  const v=document.getElementById(sid)?.value;
  if(!v) return;
  const ei=document.getElementById(eid), vi=document.getElementById(vid);
  if(ei) ei.textContent=emo(+v);
  if(vi) vi.textContent=v;
}
function getPrevDay(d){
  const dt=new Date(d+'T12:00:00'); dt.setDate(dt.getDate()-1);
  return dt.toISOString().slice(0,10);
}

// Offline detection
window.addEventListener('online',  ()=>document.getElementById('offline-badge')?.classList.remove('show'));
window.addEventListener('offline', ()=>document.getElementById('offline-badge')?.classList.add('show'));

/* ═══════════════════════════════════════════════════
   GAS API
═══════════════════════════════════════════════════ */
async function api(action, body={}, retry=2){
  const payload = { action, token: CU?.token||'_', ...body };
  for(let i=0; i<=retry; i++){
    try{
      const controller = new AbortController();
      const timer = setTimeout(()=>controller.abort(), 15000);
      const r = await fetch(GAS_URL, {
        method:'POST',
        body: JSON.stringify(payload),
        signal: controller.signal,
      });
      clearTimeout(timer);
      const d = await r.json();
      if(!d.ok) throw new Error(d.error||'API error');
      return d;
    } catch(e){
      if(i===retry) throw e;
      await new Promise(res=>setTimeout(res, 1000*(i+1)));
    }
  }
}

/* ═══════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════ */
function showReg()  { document.getElementById('screen-login').style.display='none'; document.getElementById('screen-register').classList.add('open'); }
function showLogin(){ document.getElementById('screen-register').classList.remove('open'); document.getElementById('screen-login').style.display='flex'; }

document.addEventListener('keydown', e=>{
  if(e.key==='Enter') {
    if(document.getElementById('screen-login').style.display!=='none') doLogin();
  }
});

async function doLogin(){
  const uid = document.getElementById('li').value.trim();
  const pass = document.getElementById('lp').value;
  const errEl = document.getElementById('lerr');
  const btn = document.getElementById('lbtn');
  if(!uid||!pass){ errEl.textContent='IDとパスワードを入力してください'; errEl.style.display='block'; return; }
  btn.textContent='接続中…'; btn.disabled=true; errEl.style.display='none';
  try{
    const d = await api('login', {uid, pass});
    CU = { role:d.role, name:d.name, id:d.id||uid, token:d.token, sport:d.sport||'', theme:d.theme||'', next:d.next||'' };
    await bootApp();
  } catch(e){
    errEl.textContent = e.message.includes('API error') ? e.message : 'サーバーに接続できません。しばらくしてから再試行してください。';
    errEl.style.display='block';
  } finally {
    btn.textContent='ログイン'; btn.disabled=false;
  }
}

async function doRegister(){
  const invite= document.getElementById('ri').value.trim();
  const name  = document.getElementById('rn').value.trim();
  const sport = document.getElementById('rs').value;
  const theme = document.getElementById('rt').value.trim();
  const uid   = document.getElementById('ru').value.trim();
  const pass  = document.getElementById('rp').value;
  const errEl = document.getElementById('rerr');
  const btn   = document.getElementById('rbtn');
  if(!invite||!name||!sport||!uid||!pass){ errEl.textContent='すべての必須項目を入力してください'; errEl.style.display='block'; return; }
  btn.textContent='登録中…'; btn.disabled=true; errEl.style.display='none';
  try{
    const d = await api('register', {inviteCode:invite, uid, pass, name, sport, theme});
    const user = { role:'client', name:d.name, id:d.id, token:d.token, sport:d.sport||'', theme:d.theme||'', next:d.next||'' };
    // 登録後→メンタル診断へ
    startDiag(user);
  } catch(e){
    errEl.textContent = e.message;
    errEl.style.display='block';
  } finally {
    btn.textContent='登録してメンタル診断へ →'; btn.disabled=false;
  }
}

function doLogout(){
  CU=null; COACH_CID=null; PAGE='today'; SELECTED_DATE=null;
  Object.keys(DB).forEach(k=>{ DB[k] = Array.isArray(DB[k]) ? [] : {}; });
  Object.keys(LOADED).forEach(k=>delete LOADED[k]);
  _lastLevel=0;
  document.getElementById('screen-app').style.display='none';
  document.getElementById('screen-login').style.display='flex';
  document.getElementById('li').value='';

let _diagAnswers=[],_diagCurrent=0,_pendingUser=null;

function startDiag(user){
  _pendingUser=user; _diagAnswers=[]; _diagCurrent=0;
  document.getElementById('screen-register').classList.remove('open');
  const ds=document.getElementById('screen-diag'); ds.classList.remove('hidden');
  ds.innerHTML=`<div style="width:100%;max-width:520px">
    <div style="text-align:center;margin-bottom:28px"><div style="font-size:22px;font-weight:700;color:white;margin-bottom:4px">🧠 メンタルタイプ診断</div><div style="font-size:13px;color:rgba(255,255,255,.5)">あなたの思考・行動スタイルを診断します</div></div>
    <div class="diag-prog"><div class="diag-prog-fill" id="diag-prog" style="width:5%"></div></div>
    <div class="diag-qnum" id="diag-qnum"></div><div class="diag-q" id="diag-q"></div>
    <div class="diag-opts" id="diag-opts"></div>
    <div style="display:flex;justify-content:space-between;margin-top:20px"><button id="diag-back" onclick="diagBack()" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);padding:8px 18px;border-radius:var(--r);font-family:inherit;font-size:13px;cursor:pointer;display:none">← 戻る</button><div></div></div>
  </div>`;
  renderDiagQ();
}

function renderDiagQ(){
  const q=DIAG_QS[_diagCurrent], total=DIAG_QS.length;
  document.getElementById('diag-qnum').textContent=`問${_diagCurrent+1} / ${total}`;
  document.getElementById('diag-prog').style.width=`${Math.round((_diagCurrent/total)*100)}%`;
  document.getElementById('diag-q').textContent=q.q;
  document.getElementById('diag-back').style.display=_diagCurrent>0?'block':'none';
  const labels=['1\n全く当てはまらない','2\n当てはまらない','3\nどちらでもない','4\n当てはまる','5\n十分に当てはまる'];
  document.getElementById('diag-opts').innerHTML=labels.map((l,i)=>`<button class="diag-opt ${_diagAnswers[_diagCurrent]===i+1?'sel':''}" onclick="diagAnswer(${i+1})">${l.replace('\n','<br>')}</button>`).join('');
}

function diagAnswer(score){
  _diagAnswers[_diagCurrent]=score;
  if(_diagCurrent<DIAG_QS.length-1){ _diagCurrent++; renderDiagQ(); }
  else finishDiag();
}
function diagBack(){ if(_diagCurrent>0){_diagCurrent--;renderDiagQ();} }

function finishDiag(){
  const totals={A:0,B:0,C:0,D:0};
  DIAG_QS.forEach((q,i)=>{ totals[q.t]+=(_diagAnswers[i]||3); });
  const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const topType=sorted[0][0], type=MENTAL_TYPES[topType], job=type.jobs[0];

  // 結果表示
  document.getElementById('screen-diag').innerHTML=`
  <div style="width:100%;max-width:520px;text-align:center;padding:20px">
    <div style="font-size:40px;margin-bottom:8px">${type.emoji}</div>

    <div style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px">あなたのメンタルタイプ</div>

      <div style="font-size:13px;color:rgba(255,255,255,.8);line-height:1.8">${type.desc}</div>
    </div>
    <div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:var(--rl);padding:12px;margin-bottom:14px">
      <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:5px">割り当てジョブ</div>
      <div style="font-size:20px;font-weight:700;color:white">${JOB_STATS[job]?.icon||'⚔️'} ${job}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:20px">
      ${sorted.map(([t,v])=>`<div style="background:rgba(255,255,255,.05);border-radius:var(--r);padding:8px;text-align:center"><div style="font-size:10px;color:rgba(255,255,255,.35);margin-bottom:2px">${MENTAL_TYPES[t].name}</div><div style="font-size:16px;font-weight:700;color:${t===topType?'white':'rgba(255,255,255,.35)'}">${v}</div></div>`).join('')}
    </div>
    <button onclick="completeDiag('${topType}','${job}')" style="width:100%;padding:13px;background:linear-gradient(135deg,#6d28d9,#a855f7);color:white;border:none;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">⚔️ 冒険を始める！</button>
  </div>`;
}

async function completeDiag(topType, job){
  if(_pendingUser){
    _pendingUser.mentalType=topType; _pendingUser.mentalTypeName=MENTAL_TYPES[topType].name; _pendingUser.job=job;
    CU={..._pendingUser};
  } else if(CU) {
    CU.mentalType=topType; CU.mentalTypeName=MENTAL_TYPES[topType].name; CU.job=job;
  }
  document.getElementById('screen-diag').classList.add('hidden');
  if(GAS_URL) try{await api('saveMentalType',{clientId:CU.id,mentalType:topType,job});}catch(e){}
  if(_pendingUser){ _pendingUser=null; await bootApp(); } else { go('rpg'); toast('メンタルタイプを更新しました ✓'); }
}

function getSportPixels(sport){
  if(['総合格闘技','キックボクシング','ボクシング'].includes(sport)) return _px.f;
  if(sport==='野球（ピッチャー）') return _px.p;
  if(sport==='野球（バッター）')   return _px.b;
  if(sport==='サッカー')           return _px.s;
  if(sport==='バスケ')             return _px.k;
  if(['テニス','ソフトテニス','ピックルボール'].includes(sport)) return _px.t;
  if(sport==='ゴルフ')             return _px.g;
  if(sport==='レスリング')          return _px.w;
  return _px.f;
}

function drawPixelChar(canvasId, sport, sz=5){
  const cv=document.getElementById(canvasId); if(!cv)return;
  const pixels=getSportPixels(sport||'総合格闘技');
  const colors=SPORT_COLORS[sport]||SPORT_COLORS['総合格闘技'];
  cv.width=16*sz; cv.height=16*sz;
  cv.style.width=16*sz+'px'; cv.style.height=16*sz+'px';
  const ctx=cv.getContext('2d'); ctx.clearRect(0,0,16*sz,16*sz);
  pixels.forEach((row,y)=>row.forEach((c,x)=>{ if(c===0)return; ctx.fillStyle=colors[c]||'transparent'; ctx.fillRect(x*sz,y*sz,sz,sz); }));
}

function pixelCharHTML(sport, job, level, sz=5){
  const id='pc'+Date.now()+(Math.random()*9999|0);
  const jd=JOB_STATS[job]||{icon:'⚔️',color:'#f5a623'};
  setTimeout(()=>drawPixelChar(id,sport,sz),60);
  return `<div class="pixel-wrap"><canvas id="${id}" class="pixel-canvas"></canvas><div class="char-name">Lv.${level}</div><div class="char-job-badge" style="background:${jd.color}25;border-color:${jd.color}60">${jd.icon} ${job||'冒険者'}</div></div>`;
}

async function bootApp(){
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-register').classList.remove('open');
  document.getElementById('screen-app').style.display='block';

  if(CU.role==='coach'){
    await loadClientList();
    if(!COACH_CID && Object.keys(DB.clients).length) COACH_CID = Object.keys(DB.clients)[0];
  } else {
    await loadMyData();
    // RPG初期化
    setTimeout(()=>{ _lastLevel = calcRPG().levelInfo.lv; }, 800);
  }
  initApp();
}

async function loadClientList(){
  try{
    const d = await api('getClients');
    (d.clients||[]).forEach(c=>{
      DB.clients[c.id] = { name:c.name, sport:c.sport, theme:c.theme, next:c.next, entries:[], sessions:[], loaded:false };
    });
  } catch(e){ toast('クライアント一覧の取得に失敗しました'); }
}

async function loadClientFull(cid){
  if(DB.clients[cid]?.loaded) return;
  try{
    const [eR, sR] = await Promise.all([
      api('getEntries',  {clientId:cid}),
      api('getSessions', {clientId:cid}),
    ]);
    if(!DB.clients[cid]) DB.clients[cid]={name:'',sport:'',theme:'',next:'',entries:[],sessions:[],loaded:false};
    DB.clients[cid].entries  = eR.entries  || [];
    DB.clients[cid].sessions = sR.sessions || [];
    DB.clients[cid].loaded   = true;
  } catch(e){ console.error('loadClientFull', e); }
}

async function loadMyData(){
  const cid = CU.id;
  if(LOADED[cid]) return;
  try{
    const [eR, mR, wR, gR, msgR] = await Promise.all([
      api('getEntries',  {clientId:cid}),
      api('getMemos',    {clientId:cid}),
      api('getWins',     {clientId:cid}),
      api('getGoals',    {clientId:cid}),
      api('getMessages', {clientId:cid}),
    ]);
    if(!DB.clients[cid]) DB.clients[cid]={name:CU.name,sport:CU.sport,theme:CU.theme,next:CU.next,entries:[],sessions:[],loaded:true};
    DB.clients[cid].entries = eR.entries || [];
    DB.memos    = mR.memos    || [];
    DB.wins     = wR.wins     || [];
    DB.goals    = gR.goals    || {};
    DB.messages = msgR.messages || [];
    LOADED[cid] = true;
  } catch(e){ toast('データの読み込みに失敗しました。再ログインをお試しください。'); }
}

function go(p){
  PAGE=p;
  document.querySelectorAll('.sbi,.mnavb').forEach(el=>{
    el.classList.toggle('active', (el.dataset.p||el.dataset.mp)===p);
  });
  const m = document.getElementById('main');
  if(CU.role==='client'){
    const cdata = DB.clients[CU.id] || {name:CU.name,sport:CU.sport,theme:CU.theme,next:CU.next,entries:[],sessions:[]};
    switch(p){
      case 'today':    pgToday(m, cdata);    break;
      case 'memo':     pgMemo(m);            break;
      case 'win':      pgWin(m);             break;
      case 'cond':     pgCond(m);            break;
      case 'selftalk': pgSelftalk(m);        break;
      case 'timeline': pgTimeline(m, cdata); break;
      case 'goals':    pgGoals(m);           break;
      case 'weekly':   pgWeekly(m);          break;
      case 'rpg':      pgRPG(m);             break;
      case 'calendar': pgCalendar(m, cdata); break;
      case 'message':  pgMessage(m);         break;
      default:         pgGraph(m, false);
    }
  } else {
    switch(p){
      case 'records':  pgCoach(m);       break;
      case 'sessions': pgSessions(m);    break;
      case 'ai':       pgAI(m);          break;
      case 'msg_coach':pgMsgCoach(m);    break;
      case 'gnote':    pgGnote(m);       break;
      case 'export':   pgExport(m);      break;
      case 'settings': pgSettings(m);    break;
      default:         pgGraph(m, true);
    }
  }
}

function getSelDate(){ return SELECTED_DATE || getToday(); }

function pgToday(m, cdata){
  const sel = getSelDate();
  const isToday = sel === getToday();
  const days = Math.max(0, Math.ceil((new Date(cdata.next||'2099-01-01') - new Date()) / 86400000));
  const entry = cdata.entries.find(e=>e.date===sel) || {};
  const mn = entry.m||{}, ev = entry.e||{};
  const C = 2*Math.PI*26, off = C*(1-Math.min(1,Math.max(0,1-days/14)));

  // Date nav (past 7 days)
  const dates=[];
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); dates.push(new Date(d.getTime()+9*60*60*1000).toISOString().slice(0,10)); }

      </button>`;
    }).join('')}
  </div>`;

  m.innerHTML=`
<div class="ph">
  <div>
    <div class="pht">${isToday?'今日の記録':fmt(sel)+'の記録'}</div>
    <div class="phs">${new Date(sel+'T12:00:00').toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</div>

    <svg class="ring-svg" width="62" height="62" viewBox="0 0 62 62"><circle class="ring-bg" cx="31" cy="31" r="24"/><circle class="ring-fg" cx="31" cy="31" r="24" stroke-dasharray="${C}" stroke-dashoffset="${off}"/><text x="31" y="28" text-anchor="middle" class="rdt">${days}</text><text x="31" y="39" text-anchor="middle" class="rut">日後</text></svg>

function selectDate(d){ SELECTED_DATE = d===getToday()?null:d; const c=DB.clients[CU.id]; pgToday(document.getElementById('main'), c||{entries:[]}); }

async function saveMorn(){
  const goal=document.getElementById('mg')?.value.trim(), plan=document.getElementById('mp')?.value.trim(), mood=+document.getElementById('ms')?.value||6;
  if(!goal){ toast('今日の目標を入力してください'); return; }
  const c=DB.clients[CU.id]||{entries:[]};
  const d=getSelDate(); let e=c.entries.find(x=>x.date===d);
  if(!e){ e={date:d}; c.entries.push(e); }
  e.m={goal,plan,mood};
  toast('朝の記録を保存しました ✓ +10 EXP');
  pgToday(document.getElementById('main'), c);
  bgSave('saveEntry', {clientId:CU.id, entry:e});
  setTimeout(checkLevelUp, 400);
}
async function saveEve(){
  const fact=document.getElementById('ef')?.value.trim(), interp=document.getElementById('ei')?.value.trim(), mood=+document.getElementById('es')?.value||6;
  if(!fact&&!interp){ toast('何か記録してみましょう'); return; }
  const c=DB.clients[CU.id]||{entries:[]};
  const d=getSelDate(); let e=c.entries.find(x=>x.date===d);
  if(!e){ e={date:d}; c.entries.push(e); }
  e.e={fact,interp,mood}; if(!e.note)e.note='';
  toast('夜の記録を保存しました ✓ +10 EXP');
  pgToday(document.getElementById('main'), c);
  bgSave('saveEntry', {clientId:CU.id, entry:e});
  setTimeout(checkLevelUp, 400);
}

let _wcat='技術⚙️';
function selWinCat(el,c){ _wcat=c; document.querySelectorAll('.wcat-btn').forEach(b=>{b.style.cssText='padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--n50);font-size:12px;cursor:pointer;transition:all .15s;';}); el.style.background='var(--g100)'; el.style.borderColor='var(--g500)'; el.style.color='var(--g700)'; el.style.fontWeight='700'; }
function calcStreak(){
  if(!DB.wins.length) return 0;
  const dates=[...new Set(DB.wins.map(w=>w.date))].sort().reverse();
  const today=getToday();
  if(dates[0]!==today&&dates[0]!==getPrevDay(today)) return 0;
  let s=1,prev=dates[0];
  for(let i=1;i<dates.length;i++){ if(dates[i]===getPrevDay(prev)){s++;prev=dates[i];}else break; }
  return s;
}
function saveWin(){
  const text=document.getElementById('wt')?.value.trim();
  if(!text){ toast('できたことを入力してください'); return; }
  const win={id:Date.now().toString(),text,category:_wcat,date:getToday()};
  DB.wins.push(win);
  document.getElementById('wt').value='';
  toast('🏆 できた！ +8 EXP');
  pgWin(document.getElementById('main'));
  bgSave('saveWin', {clientId:CU.id, win});
  setTimeout(checkLevelUp,400);
}
function delWin(id){ DB.wins=DB.wins.filter(x=>x.id!==id); pgWin(document.getElementById('main')); bgSave('deleteWin',{clientId:CU.id,winId:id}); }

let _condVals={body:5,mind:5,focus:5};
function setCond(type, val){

  if(lbl) lbl.textContent=condLabel(val,type);
}
function condLabel(v,type){
  const labels={body:['','最悪','悪い','普通','良い','最高'],mind:['','沈んでいる','不安定','普通','安定','絶好調'],focus:['','バラバラ','散漫','普通','集中','超集中']};
  return (labels[type]||[])[Math.ceil(v/2)]||'';
}
function saveCond(){

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
let _calYear=new Date().getFullYear(), _calMonth=new Date().getMonth();
function pgCalendar(m, cdata){
  const y=_calYear, mo=_calMonth;
  const firstDay=new Date(y,mo,1).getDay();
  const daysInMonth=new Date(y,mo+1,0).getDate();
  const today=getToday();
  const label=new Date(y,mo,1).toLocaleDateString('ja-JP',{year:'numeric',month:'long'});
  const days=['日','月','火','水','木','金','土'];

  let cells='';
  for(let d=0;d<firstDay;d++) cells+=`<div class="caldc other-month"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const e=cdata.entries.find(x=>x.date===dateStr);
    const hasBoth=e?.m&&e?.e;
    const hasMorn=e?.m&&!e?.e;
    const hasEve=!e?.m&&e?.e;
    const isToday=dateStr===today;
    const isSel=dateStr===getSelDate();
    let cls='caldc';
    if(hasBoth) cls+=' has-both';
    else if(hasMorn) cls+=' has-morning';

async function saveYearGoal(){
  DB.goals.yearGoal=document.getElementById('gy')?.value.trim();
  DB.goals.yearValue=document.getElementById('gv')?.value.trim();
  bgSave('saveGoals',{clientId:CU.id,goals:DB.goals});
  toast('1年間の目標を保存しました ✓');
}
async function saveMonthGoal(month){
  if(!DB.goals.monthly)DB.goals.monthly={};
  DB.goals.monthly[month]={theme:document.getElementById('gmt')?.value.trim(),action:document.getElementById('gma')?.value.trim()};
  bgSave('saveGoals',{clientId:CU.id,goals:DB.goals});
  toast('月間テーマを保存しました ✓');
  pgGoals(document.getElementById('main'));
}
async function saveBiweekly(){
  const theme=document.getElementById('gbt')?.value.trim(), reason=document.getElementById('gbr')?.value.trim();
  if(!theme){toast('テーマを入力してください');return;}
  if(!DB.goals.biweekly)DB.goals.biweekly=[];
  const today=getToday();
  if(DB.goals.biweekly[0]?.date===today) DB.goals.biweekly[0]={date:today,theme,reason};
  else DB.goals.biweekly.unshift({date:today,theme,reason});
  bgSave('saveGoals',{clientId:CU.id,goals:DB.goals});
  toast('2週間テーマを保存しました ✓');
  pgGoals(document.getElementById('main'));
}

}

function calcRPG(){
  const c=DB.clients[CU.id]||{};
  const entries=c.entries||[],wins=DB.wins||[],memos=DB.memos||[];
  let exp=0; const recorded=new Set();
  entries.forEach(e=>{
    if(e.m?.goal)exp+=10; if(e.e?.fact||e.e?.interp)exp+=10;
    if(e.m?.goal&&(e.e?.fact||e.e?.interp)){exp+=5;recorded.add(e.date);}
    if((e.e?.mood||0)>=8)exp+=3;
  });
  wins.forEach(()=>exp+=8); memos.forEach(()=>exp+=3);
  const streak=calcStreak();
  if(streak>=3)exp+=20; if(streak>=7)exp+=50; if(streak>=14)exp+=100;
  if(streak>=30)exp+=200; if(streak>=50)exp+=500; if(streak>=100)exp+=1000;

  // weekly count from localStorage
  const wkKeys=Object.keys(localStorage).filter(k=>k.startsWith(`wk_${CU.id}_`)).length;
  const stats={recordDays:recorded.size,winCount:wins.length,memoCount:memos.length,
    condCount:CONDS.length,selftalkCount:SELFTALKS.length,weeklyCount:wkKeys};

  let li=RPG_LEVELS[0],nl=RPG_LEVELS[1];
  for(let i=RPG_LEVELS.length-1;i>=0;i--){if(exp>=RPG_LEVELS[i].minExp){li=RPG_LEVELS[i];nl=RPG_LEVELS[i+1]||null;break;}}
  const expIn=exp-li.minExp,expTo=nl?nl.minExp-li.minExp:9999,prog=nl?Math.min(100,Math.round(expIn/expTo*100)):100;

  // equip: best item per slot
  const rpgRef={stats,streak,levelInfo:li};
  const equip={};
  EQUIPMENT_DEFS.forEach(eq=>{
    if(eq.cond(rpgRef)){
      const cur=equip[eq.slot];
      if(!cur||(eq.atk+eq.def+eq.hp+eq.agi+eq.mag)>(cur.atk+cur.def+cur.hp+cur.agi+cur.mag)) equip[eq.slot]=eq;
    }
  });

  // stats base + bonus
  const base={
    atk:Math.min(999,Math.round(li.lv*2+streak*0.5+wins.length*0.3)),
    def:Math.min(999,Math.round(li.lv*1.5+CONDS.length*1.2)),
    hp: Math.min(999,Math.round(li.lv*3+recorded.size*0.8+streak*1)),
    agi:Math.min(999,Math.round(li.lv*1.5+memos.length*0.5)),
    mag:Math.min(999,Math.round(li.lv*2+wkKeys*3+SELFTALKS.length*0.8)),
  };
  const bonus={atk:0,def:0,hp:0,agi:0,mag:0};
  Object.values(equip).forEach(eq=>{bonus.atk+=eq.atk;bonus.def+=eq.def;bonus.hp+=eq.hp;bonus.agi+=eq.agi;bonus.mag+=eq.mag;});
  const total={atk:base.atk+bonus.atk,def:base.def+bonus.def,hp:base.hp+bonus.hp,agi:base.agi+bonus.agi,mag:base.mag+bonus.mag};
  return {exp,levelInfo:li,nextLevel:nl,expInLevel:expIn,expToNext:expTo,progress:prog,stats,streak,equip,base,bonus,total};
}

function getCycles(entries){
  const s=[...entries].sort((a,b)=>a.date.localeCompare(b.date));
  const c=[]; for(let i=0;i<s.length;i+=14)c.push(s.slice(i,i+14)); return c;
}
function pgGraph(m, isCoach){
  const cid=isCoach?COACH_CID:CU.id;
  const c=DB.clients[cid]||{name:'',entries:[]};
  const cycles=getCycles(c.entries);
  if(CYC>=cycles.length) CYC=Math.max(0,cycles.length-1);
  const tabs=isCoach?`<div class="ctabs">${Object.entries(DB.clients).map(([id,cl])=>`<button class="ctab ${id===COACH_CID?'active':''}" onclick="COACH_CID='${id}';pgGraph(document.getElementById('main'),true)">${cl.name}</button>`).join('')}</div>`:'';
  const cBtns=cycles.map((cy,i)=>`<button class="cyc ${i===CYC?'active':''}" onclick="CYC=${i};pgGraph(document.getElementById('main'),${isCoach})">${cy[0]?.date||''}〜${cy[cy.length-1]?.date||''}</button>`).join('');
  const data=cycles[CYC]||[];
  const mv=data.map(e=>e.m?.mood).filter(Boolean), ev2=data.map(e=>e.e?.mood).filter(Boolean), all=[...mv,...ev2];
  const avg=all.length?(all.reduce((s,v)=>s+v,0)/all.length).toFixed(1):'—', mx=all.length?Math.max(...all):'—';
  const recs=data.filter(e=>e.m||e.e).length, rate=data.length?Math.round(recs/data.length*100):0, full=data.filter(e=>e.m&&e.e).length;
  m.innerHTML=`<div class="ph"><div><div class="pht">${isCoach?'グラフ分析':'2週間グラフ'}</div><div class="phs">気分・メンタルの推移</div></div></div>
${tabs}<div class="cycbtns">${cBtns||'<span style="font-size:12px;color:var(--text3)">記録がありません</span>'}</div>
<div class="stats"><div class="stat"><div class="stl">平均スコア</div><div class="stv">${avg}</div><div class="sts">/ 10</div></div><div class="stat"><div class="stl">ピーク</div><div class="stv" style="color:var(--g400)">${mx}</div><div class="sts">最高</div></div><div class="stat"><div class="stl">記録率</div><div class="stv" style="color:var(--morning)">${rate}<span style="font-size:14px">%</span></div><div class="sts">${recs}/${data.length}日</div></div><div class="stat"><div class="stl">朝夜セット</div><div class="stv" style="color:var(--evening)">${full}</div><div class="sts">完了日</div></div></div>
<div class="chc"><div class="chct"><span class="chctt">${isCoach?c.name+' — ':''}気分スコア推移</span><div class="leg"><div class="lgi"><div class="lgd" style="background:var(--morning)"></div>朝</div><div class="lgi"><div class="lgd" style="background:var(--evening)"></div>夜</div></div></div><canvas id="gc" height="180"></canvas></div>`;
  drawGraph(data);
}
function drawGraph(data){
  const cv=document.getElementById('gc'); if(!cv)return;
  const W=cv.offsetWidth||660, H=180; cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d'), P={t:14,r:14,b:28,l:28}, cw=W-P.l-P.r, ch=H-P.t-P.b;
  ctx.clearRect(0,0,W,H);
  for(let i=1;i<=4;i++){const y=P.t+ch-(ch*i*2/10);ctx.strokeStyle='rgba(0,0,0,.05)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cw,y);ctx.stroke();ctx.fillStyle='rgba(0,0,0,.25)';ctx.font='9px monospace';ctx.textAlign='right';ctx.fillText(i*2,P.l-3,y+3);}
  if(!data.length)return;
  const xs=cw/Math.max(data.length-1,1);
  function line(vals,color){
    const pts=vals.map((v,i)=>[P.l+i*xs,P.t+ch-ch*(v-1)/9]);
    if(!pts.length)return;
    ctx.beginPath();ctx.moveTo(pts[0][0],P.t+ch);pts.forEach(([x,y])=>ctx.lineTo(x,y));ctx.lineTo(pts[pts.length-1][0],P.t+ch);ctx.closePath();
    const g=ctx.createLinearGradient(0,P.t,0,P.t+ch);g.addColorStop(0,color+'40');g.addColorStop(1,color+'00');ctx.fillStyle=g;ctx.fill();
    if(pts.length>1){ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';pts.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));ctx.stroke();}
    pts.forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();});
  }
  const mv=data.map(e=>e.m?.mood||null), ev=data.map(e=>e.e?.mood||null);
  const mf=mv.map((v,i)=>v||ev[i]||5), ef=ev.map((v,i)=>v||mv[i]||5);
  if(mv.some(v=>v))line(mf,'#e07c2a');
  if(ev.some(v=>v))line(ef,'#2a7ec0');
  ctx.fillStyle='rgba(0,0,0,.25)';ctx.font='9px monospace';ctx.textAlign='center';
  data.forEach((e,i)=>{if(data.length<=7||i%2===0)ctx.fillText(e.date.slice(5),P.l+i*xs,H-6);});
}

function saveNote(cid,date,val){
  const e=DB.clients[cid]?.entries.find(x=>x.date===date);
  if(e){ e.note=val; bgSave('saveEntry',{clientId:cid,entry:e}); toast('メモを保存 ✓'); }
}

    m.innerHTML=`<div style="padding:50px;text-align:center;color:var(--text3)"><div class="adts" style="justify-content:center;margin-bottom:10px"><div class="adt"></div><div class="adt"></div><div class="adt"></div></div><div style="font-size:13px">読み込んでいます…</div></div>`;
    await loadClientFull(COACH_CID);
  }
  const c=DB.clients[COACH_CID];
  const tabs=Object.entries(DB.clients).map(([id,cl])=>`<button class="ctab ${id===COACH_CID?'active':''}" onclick="COACH_CID='${id}';pgSessions(document.getElementById('main'))">${cl.name}</button>`).join('');

function renderSessList(){
  const c=DB.clients[COACH_CID]; if(!c)return;
  const sorted=[...c.sessions].sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('sess-list'); if(!el)return;
  el.innerHTML=sorted.map(s=>`
    <div class="si2">
      <div class="si2h" onclick="toggleSI('si2b-${s.id}')">
        <div class="si2hl"><div class="si2d"></div><span class="si2dt">${fmt(s.date)}</span><span class="si2th">${s.theme||''}</span></div>
        <div style="display:flex;gap:5px"><button class="btn btn-a btn-xs" onclick="event.stopPropagation();genSessAI('${s.id}')">✦ AI</button><button class="btn btn-gh btn-xs" onclick="event.stopPropagation();delSess('${s.id}')">削除</button></div>
      </div>
      <div class="si2bdy" id="si2b-${s.id}">
        <div class="smtxt">${s.memo}</div>
        <div id="sai-${s.id}">${s.aiCache?renderSessAI(s.aiCache):''}</div>
        <div style="margin-top:8px"><div class="cnol">📝 追記</div><textarea class="cno" rows="2" placeholder="このセッションへの追記…" onchange="updateSessNote('${s.id}',this.value)">${s.extraNote||''}</textarea></div>
      </div>
    </div>`).join('')||'<div class="empty"><div class="ei">📝</div>まだセッションメモがありません</div>';
}
function openAddSession(){ document.getElementById('add-sess-form').style.display='block'; document.getElementById('add-sess-form').scrollIntoView({behavior:'smooth'}); }
function closeAddSession(){ document.getElementById('add-sess-form').style.display='none'; }
async function saveSess(){
  const date=document.getElementById('ns-d')?.value, theme=document.getElementById('ns-t')?.value.trim(), memo=document.getElementById('ns-m')?.value.trim();
  if(!memo){ toast('セッションメモを入力してください'); return; }
  const s={id:Date.now().toString(),date:date||getToday(),theme,memo,aiCache:null,extraNote:''};
  DB.clients[COACH_CID].sessions.push(s);
  closeAddSession();
  toast('セッションを保存しました ✓');
  bgSave('saveSession',{clientId:COACH_CID,session:s});
  renderSessList();
}
async function delSess(id){
  if(!confirm('削除しますか？'))return;
  DB.clients[COACH_CID].sessions=DB.clients[COACH_CID].sessions.filter(s=>s.id!==id);
  bgSave('deleteSession',{sessionId:id});
  renderSessList(); toast('削除しました');
}
function updateSessNote(id,val){ const s=DB.clients[COACH_CID].sessions.find(x=>x.id===id); if(s){s.extraNote=val;bgSave('saveSession',{clientId:COACH_CID,session:s});} }

function genSessAI(id){
  const s=DB.clients[COACH_CID].sessions.find(x=>x.id===id); if(!s)return;
  const el=document.getElementById(`sai-${id}`); if(!el)return;
  el.innerHTML=`<div class="agen"><div class="adts"><div class="adt"></div><div class="adt"></div><div class="adt"></div></div><div class="agt">分析中…</div></div>`;
  setTimeout(()=>{ s.aiCache=AI_SESS_MOCK; el.innerHTML=renderSessAI(AI_SESS_MOCK); toast('AI分析完了 ✓'); },1400);

  document.getElementById('pat-result').innerHTML=`<div class="agen"><div class="adts"><div class="adt"></div><div class="adt"></div><div class="adt"></div></div><div class="agt">全セッションを横断分析しています…</div></div>`;

  setTimeout(()=>{ RPT_CACHE[COACH_CID]=PAT_MOCK; document.getElementById('pat-result').innerHTML=renderPattern(PAT_MOCK); if(btn){btn.disabled=false;btn.textContent='再生成';} toast('パターン分析完了 ✓'); },2000);

function renderAIResult(d){
  const si=[ {l:'ポジティブな変化',i:'✅',c:'var(--g600)',t:d.summary?.positive_change}, {l:'繰り返しのパターン',i:'🔄',c:'var(--morning)',t:d.summary?.pattern}, {l:'メンタルの傾向',i:'📈',c:'var(--evening)',t:d.summary?.mood_trend}, {l:'テーマへの取り組み',i:'🎯',c:'var(--ai-text)',t:d.summary?.theme_progress} ].filter(x=>x.t);
  return `<div class="asec"><div class="asect"><span class="aico">📊</span>2週間のサマリー</div><div class="sgrid">${si.map(s=>`<div class="si"><div class="sil" style="color:${s.c}">${s.i} ${s.l}</div><div class="sit">${s.t}</div></div>`).join('')}</div></div><div class="asec"><div class="asect"><span class="aico">🔍</span>本質的な課題</div>${(d.core_issues||[]).map(x=>`<div class="icard"><div class="ict">${x.title}</div><div class="icb">${x.description}</div>${x.evidence?`<div class="ice">📌 ${x.evidence}</div>`:''}</div>`).join('')}</div><div class="asec"><div class="asect"><span class="aico">📝</span>セッション用ワークシート</div>${(d.worksheet||[]).map((q,i)=>`<div class="wsq"><div class="wsn">${i+1}</div><div><div class="wsqt">${q.question}</div>${q.intent?`<div class="wsqi">→ ${q.intent}</div>`:''}</div></div>`).join('')}</div>`;
}

/* ── COACH MESSAGE ── */
async function pgMsgCoach(m){
  const tabs=Object.entries(DB.clients).map(([id,cl])=>`<button class="ctab ${id===COACH_CID?'active':''}" onclick="COACH_CID='${id}';pgMsgCoach(document.getElementById('main'))">${cl.name}</button>`).join('');
  let msgs=[];
  try{ const r=await api('getMessages',{clientId:COACH_CID}); msgs=r.messages||[]; }catch(e){}
  m.innerHTML=`<div class="ph"><div><div class="pht">💬 メッセージ送信</div><div class="phs">クライアントへひとこと届ける</div></div></div>
<div class="pbar">🔒 送信先クライアントのみ閲覧できます。</div>
<div class="ctabs">${tabs}</div>
<div class="card"><div class="ch"><div class="cht"><div class="cd" style="background:var(--g500)"></div>${DB.clients[COACH_CID]?.name||''}へのメッセージ</div></div><div class="cb">
  <div class="fh">セッション間の励まし・気づきのシェア・宿題のリマインドなど、気軽に送ってください。</div>
  <textarea id="cmsg" rows="4" placeholder="例：先週の練習、ミス後の切り替えが早くなっていましたね。その調子で今週も意識してみてください。"></textarea>
  <div class="br" style="padding-top:8px"><button class="btn btn-g" onclick="sendMsg()">💬 送信する</button></div>
</div></div>
<div class="sr"><span class="sl">送信済み</span><div class="sline"></div></div>
${[...msgs].reverse().map(msg=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px"><div style="font-size:11px;color:var(--text3);margin-bottom:6px">${msg.date}</div><div style="font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap">${msg.text}</div></div>`).join('')||'<div class="empty"><div class="ei">💬</div>まだ送信したメッセージはありません</div>'}`;
}
async function sendMsg(){
  const text=document.getElementById('cmsg')?.value.trim();
  if(!text){toast('メッセージを入力してください');return;}
  try{
    await api('saveMessage',{clientId:COACH_CID,message:{id:Date.now().toString(),text,date:getToday()}});
    document.getElementById('cmsg').value='';
    toast('メッセージを送信しました ✓');
    pgMsgCoach(document.getElementById('main'));
  }catch(e){toast('送信エラー: '+e.message);}
}

  let notes=[];
  try{ const r=await api('getGnotes',{clientId:COACH_CID}); notes=r.notes||[]; }catch(e){}

<div class="pbar">🔒 指定クライアントのみ閲覧できます。</div>
<div class="ctabs">${tabs}</div>
<div class="card"><div class="cb">
  <div class="fh">セッションの中で生まれた大切な言葉・気づき・比喩を記録してください。クライアントのメッセージ欄に届きます。</div>
  <div class="field"><div class="fl">タイトル</div><input type="text" id="gn-t" placeholder="例：ミスは情報だ"></div>
  <div class="field"><div class="fl">内容</div><textarea id="gn-c" rows="4" placeholder="例：今日のセッションで出てきた言葉。ミスは「失敗」ではなく「気づきのための情報」。この視点を持ち続けることで、感情の反応が変わってくる。"></textarea></div>

${[...notes].reverse().map(n=>`<div class="gncard"><div class="gntitle">${n.title||''}</div><div class="gntext">${n.text}</div><div class="gndate">${n.date}</div></div>`).join('')||'<div class="empty"><div class="ei">📖</div>まだ送信した成長ノートはありません</div>'}`;
}
async function saveGnote(){
  const title=document.getElementById('gn-t')?.value.trim(), text=document.getElementById('gn-c')?.value.trim();
  if(!text){toast('内容を入力してください');return;}
  try{
    await api('saveGnote',{clientId:COACH_CID,note:{id:Date.now().toString(),title,text,date:getToday()}});
    document.getElementById('gn-t').value=''; document.getElementById('gn-c').value='';
    toast('成長ノートを送りました ✓');
    pgGnote(document.getElementById('main'));
  }catch(e){toast('送信エラー: '+e.message);}
}

/* ── EXPORT ── */
function pgExport(m){
  const tabs=Object.entries(DB.clients).map(([id,cl])=>`<button class="ctab ${id===COACH_CID?'active':''}" onclick="COACH_CID='${id}';pgExport(document.getElementById('main'))">${cl.name}</button>`).join('');
  const c=DB.clients[COACH_CID]||{entries:[],sessions:[]};
  m.innerHTML=`<div class="ph"><div><div class="pht">📥 CSVエクスポート</div><div class="phs">Googleスプレッドシートへのインポート用</div></div></div>
<div class="pbar">🔒 エクスポートされるのは選択中のクライアントのデータのみです。</div>
<div class="ctabs">${tabs}</div>
<div style="background:var(--g50);border:1px solid var(--g200);border-radius:var(--rl);padding:14px 18px;margin-bottom:16px">
  <div style="font-size:12px;font-weight:700;color:var(--g700);margin-bottom:8px">📌 インポート手順</div>
  <ol style="font-size:12px;color:var(--text2);line-height:2;padding-left:16px">
    <li>下のボタンでCSVをダウンロード</li><li>Googleスプレッドシートを開く</li><li>「ファイル」→「インポート」→「アップロード」</li>
  </ol>
</div>
<div style="display:grid;gap:12px">
  <div class="card"><div class="ch"><div class="cht"><div class="cd" style="background:var(--accent)"></div>日々の記録</div><span class="badge bg">${c.entries.length}件</span></div><div class="cb"><div style="font-size:12px;color:var(--text3);margin-bottom:12px">日付・目標・行動・気分・事実・感情・メンタルを1行1日で記録</div><div class="br" style="padding-top:0"><button class="btn btn-g" onclick="dlCSV('entries')">📥 ダウンロード</button></div></div></div>
  <div class="card"><div class="ch"><div class="cht"><div class="cd" style="background:var(--session)"></div>セッションメモ</div><span class="badge" style="background:var(--session-bg);color:var(--session);border:1px solid var(--session-bd)">${c.sessions.length}件</span></div><div class="cb"><div style="font-size:12px;color:var(--text3);margin-bottom:12px">日付・テーマ・メモ内容を記録</div><div class="br" style="padding-top:0"><button class="btn btn-s" onclick="dlCSV('sessions')">📥 ダウンロード</button></div></div></div>
  <div style="background:linear-gradient(135deg,var(--g50),#fff);border:1.5px solid var(--g300);border-radius:var(--rl);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div><div style="font-size:14px;font-weight:700;color:var(--g700);margin-bottom:3px">📦 全データを一括ダウンロード</div><div style="font-size:12px;color:var(--text3)">記録・セッションメモをまとめてダウンロード</div></div>
    <button class="btn btn-g" onclick="dlAll()">📥 一括ダウンロード</button>
  </div>
</div>`;
}
function escCSV(v){ if(v==null)return''; const s=String(v).replace(/\r?\n/g,' '); return s.includes(',')||s.includes('"')?`"${s.replace(/"/g,'""')}"`:s; }
function mkCSV(headers,rows){ return [headers.map(escCSV).join(','),...rows.map(r=>r.map(escCSV).join(','))].join('\r\n'); }
function dlFile(csv,name){ const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); }
function dlCSV(type){
  const c=DB.clients[COACH_CID]||{}, name=(c.name||'client').replace(/\s/g,'_'), today=getToday();
  if(type==='entries'){ dlFile(mkCSV(['クライアントID','日付','朝の目標','行動計画','朝の気分','事実','解釈・感情','夜のメンタル','コーチメモ'],(c.entries||[]).map(e=>[COACH_CID,e.date,e.m?.goal||'',e.m?.plan||'',e.m?.mood||'',e.e?.fact||'',e.e?.interp||'',e.e?.mood||'',e.note||''])),`MindLog_記録_${name}_${today}.csv`); toast('記録をダウンロードしました ✓'); }
  else{ dlFile(mkCSV(['セッションID','クライアントID','日付','テーマ','メモ'],(c.sessions||[]).map(s=>[s.id,COACH_CID,s.date,s.theme||'',s.memo||''])),`MindLog_セッション_${name}_${today}.csv`); toast('セッションをダウンロードしました ✓'); }
}
function dlAll(){
  const c=DB.clients[COACH_CID]||{}, name=(c.name||'client').replace(/\s/g,'_'), today=getToday();
  dlFile(mkCSV(['クライアントID','日付','朝の目標','行動計画','朝の気分','事実','解釈・感情','夜のメンタル','コーチメモ'],(c.entries||[]).map(e=>[COACH_CID,e.date,e.m?.goal||'',e.m?.plan||'',e.m?.mood||'',e.e?.fact||'',e.e?.interp||'',e.e?.mood||'',e.note||''])),`MindLog_記録_${name}_${today}.csv`);
  setTimeout(()=>dlFile(mkCSV(['セッションID','日付','テーマ','メモ'],(c.sessions||[]).map(s=>[s.id,s.date,s.theme||'',s.memo||''])),`MindLog_セッション_${name}_${today}.csv`),500);
  toast('2ファイルをダウンロードします ✓');
}
</script>
