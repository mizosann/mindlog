<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindLog</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&display=swap');
:root{
  --g50:#f0faf4;--g100:#d6f0e0;--g200:#aaddc2;--g300:#6dc49c;--g400:#3aaa77;--g500:#1f8f5e;--g600:#157249;--g700:#0e5535;--g800:#083d25;
  --n0:#fff;--n50:#f8f9f8;--n100:#eef0ed;--n200:#dde0db;--n300:#bcc0b9;--n400:#8f9490;--n500:#646a65;--n600:#434845;--n700:#2b2f2c;
  --bg:var(--n50);--surface:var(--n0);--border:var(--n200);--border2:var(--n100);
  --text:var(--n700);--text2:var(--n500);--text3:var(--n400);
  --accent:var(--g500);--accent-bg:var(--g50);--accent-bd:var(--g200);
  --morning:#e07c2a;--morning-bg:#fff7ee;--morning-bd:#f5d4b0;
  --evening:#2a7ec0;--evening-bg:#eff6ff;--evening-bd:#b3d4f0;
  --fact-c:#2a7ec0;--interp-c:#9b4dca;--interp-bg:#f8f0ff;--interp-bd:#d8b4f0;
  --ai:#7c3aed;--ai-bg:#faf5ff;--ai-bd:#ddd6fe;--ai-text:#5b21b6;
  --session:#0f766e;--session-bg:#f0fdfa;--session-bd:#99f6e4;
  --r:6px;--rl:10px;--rll:14px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 12px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);
  --sh3:0 12px 40px rgba(0,0,0,.10),0 2px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--n200);border-radius:3px;}

/* ── LOGIN ── */
#screen-login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,var(--g50) 0%,var(--n50) 50%,#f0f0ff 100%);}
.login-wrap{width:100%;max-width:400px;padding:20px;}
.login-logo-wrap{text-align:center;margin-bottom:32px;}
.login-logomark{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--g500),var(--g300));margin-bottom:12px;box-shadow:0 8px 24px rgba(31,143,94,.3);}
.login-logomark svg{width:28px;height:28px;fill:white;}
.login-brand{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--g700);}
.login-tagline{font-size:12px;color:var(--text3);margin-top:2px;}
.login-card{background:var(--surface);border-radius:var(--rll);padding:32px;box-shadow:var(--sh3);border:1px solid var(--border2);}
.login-card-title{font-size:17px;font-weight:700;margin-bottom:22px;}
.lf{margin-bottom:14px;}
.lf-label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:.03em;}
.lf-input{width:100%;padding:10px 13px;background:var(--n50);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-family:'Noto Sans JP',sans-serif;transition:border-color .18s;}
.lf-input:focus{outline:none;border-color:var(--accent);background:var(--surface);}
.login-error{font-size:12px;color:#c0392b;margin-top:6px;display:none;padding:7px 10px;background:#fff5f5;border-radius:var(--r);border:1px solid #fcccc8;}
.login-submit{width:100%;padding:12px;margin-top:6px;background:var(--g500);color:white;border:none;border-radius:var(--r);font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .18s;}
.login-submit:hover{background:var(--g600);}
.demo-section{margin-top:22px;padding-top:18px;border-top:1px solid var(--border2);}
.demo-title{font-size:11px;color:var(--text3);text-align:center;margin-bottom:10px;}
.demo-list{display:flex;flex-direction:column;gap:7px;}
.demo-btn{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--n50);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-size:13px;cursor:pointer;transition:all .18s;}
.demo-btn:hover{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--text);}
.demo-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.05em;}
.pill-coach{background:var(--g100);color:var(--g700);}
.pill-client{background:var(--morning-bg);color:var(--morning);}

/* ── APP SHELL ── */
#screen-app{display:none;}
.app-shell{display:flex;min-height:100vh;}
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-header{padding:20px 20px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px;}
.sb-logomark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--g500),var(--g300));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-logomark svg{width:17px;height:17px;fill:white;}
.sb-brand{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--g700);}
.sb-user{padding:14px 16px;margin:10px 10px 0;background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:var(--rl);}
.sb-user-name{font-size:14px;font-weight:700;}
.sb-user-role{font-size:11px;font-weight:500;margin-top:2px;}
.role-coach{color:var(--g600);}
.role-client{color:var(--morning);}
.sb-nav{flex:1;padding:14px 0;}
.sb-section{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:12px 20px 5px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 20px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .16s;border-left:2.5px solid transparent;margin:1px 0;}
.sb-item:hover{color:var(--text);background:var(--n50);}
.sb-item.active{color:var(--accent);font-weight:700;background:var(--accent-bg);border-left-color:var(--accent);}
.sb-bottom{padding:12px 10px;border-top:1px solid var(--border2);}
.logout-btn{width:100%;padding:9px;border-radius:var(--r);background:transparent;border:1px solid var(--border);color:var(--text3);font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .18s;}
.logout-btn:hover{border-color:#c0392b;color:#c0392b;background:#fff5f5;}
.main{flex:1;overflow-y:auto;min-width:0;}
.main-inner{padding:28px 32px 80px;max-width:960px;}

/* ── COMMON ── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.ph-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;}
.ph-sub{font-size:12px;color:var(--text3);margin-top:3px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--sh);margin-bottom:16px;overflow:hidden;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border2);background:var(--n50);}
.card-head-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;}
.card-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.card-body{padding:18px 20px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-morning{background:var(--morning-bg);color:var(--morning);border:1px solid var(--morning-bd);}
.badge-evening{background:var(--evening-bg);color:var(--evening);border:1px solid var(--evening-bd);}
.badge-done{background:var(--g100);color:var(--g600);border:1px solid var(--g200);}
.badge-session{background:var(--session-bg);color:var(--session);border:1px solid var(--session-bd);}
.theme-box{background:linear-gradient(135deg,var(--g50) 0%,#fff 100%);border:1px solid var(--accent-bd);border-radius:var(--rl);padding:16px 18px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px;}
.theme-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--g500),var(--g300));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.theme-icon svg{width:18px;height:18px;fill:white;}
.theme-label{font-size:11px;font-weight:700;color:var(--g600);letter-spacing:.05em;margin-bottom:4px;}
.theme-text{font-size:15px;font-weight:700;color:var(--g800);line-height:1.4;}
.field{margin-bottom:16px;}
.fl{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--text2);margin-bottom:5px;}
.fl-hint{font-size:12px;color:var(--text3);margin-bottom:7px;line-height:1.5;}
textarea,input[type=text]{width:100%;padding:10px 13px;background:var(--n50);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.8;resize:vertical;transition:border-color .18s;}
textarea:focus,input[type=text]:focus{outline:none;background:var(--surface);border-color:var(--accent);}
textarea.f-morning:focus{border-color:var(--morning);}
textarea.f-fact:focus{border-color:var(--fact-c);}
textarea.f-interp:focus{border-color:var(--interp-c);}
textarea.f-session:focus{border-color:var(--session);}
.mood-row{display:flex;align-items:center;gap:12px;padding:13px 0 4px;border-top:1px solid var(--border2);}
.mood-label-txt{font-size:12px;font-weight:700;color:var(--text2);white-space:nowrap;}
.mood-emoji{font-size:22px;width:28px;text-align:center;}
.mood-track{flex:1;display:flex;align-items:center;gap:8px;}
input[type=range]{flex:1;-webkit-appearance:none;height:5px;background:var(--n200);border-radius:3px;cursor:pointer;border:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 3px rgba(31,143,94,.15);transition:transform .15s;}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15);}
.mood-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);width:32px;text-align:center;}
.divider{height:1px;background:var(--border2);margin:14px 0;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:var(--r);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .18s;letter-spacing:.02em;}
.btn-primary{background:var(--g500);color:white;}
.btn-primary:hover{background:var(--g600);}
.btn-morning{background:var(--morning);color:white;}
.btn-morning:hover{filter:brightness(.9);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--n50);border-color:var(--n300);}
.btn-ai{background:var(--ai);color:white;}
.btn-ai:hover{background:#6d28d9;}
.btn-session{background:var(--session);color:white;}
.btn-session:hover{background:#0d6460;}
.btn-sm{padding:6px 13px;font-size:12px;}
.btn-xs{padding:4px 10px;font-size:11px;}
.btn-row{display:flex;justify-content:flex-end;gap:8px;padding-top:10px;}
.sec-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sec-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--border2);}
.mini-bar{width:60px;height:4px;background:var(--n200);border-radius:2px;overflow:hidden;}
.mini-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--g300),var(--g500));}
.data-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);padding-top:8px;border-top:1px solid var(--border2);margin-top:8px;flex-wrap:wrap;}
.es{background:var(--n50);border:1px solid var(--border2);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.es-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.es-text{font-size:13px;line-height:1.8;color:var(--text2);}
.ec{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;box-shadow:var(--sh);overflow:hidden;transition:box-shadow .18s;}
.ec:hover{box-shadow:var(--sh2);}
.ec-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;transition:background .16s;}
.ec-head:hover{background:var(--n50);}
.ec-hl{display:flex;align-items:center;gap:10px;}
.ec-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dot-m{background:var(--morning);}
.dot-e{background:var(--evening);}
.dot-b{background:var(--accent);}
.dot-s{background:var(--session);}
.ec-date{font-size:13px;font-weight:700;}
.ec-tags{display:flex;gap:5px;}
.ec-body{padding:6px 16px 16px;display:grid;gap:8px;}
.ec.collapsed .ec-body{display:none;}
.client-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.ctab{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;background:var(--surface);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;transition:all .18s;}
.ctab:hover{border-color:var(--accent-bd);color:var(--text);}
.ctab.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:700;}
.privacy-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;margin-bottom:18px;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);font-size:12px;color:var(--g600);font-weight:500;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;box-shadow:var(--sh);}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500;}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;line-height:1;color:var(--accent);}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.cycle-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.cyc{padding:5px 13px;border-radius:20px;font-family:'DM Mono',monospace;font-size:11px;background:var(--surface);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;transition:all .18s;}
.cyc.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:700;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px 22px;margin-bottom:16px;box-shadow:var(--sh);}
.chart-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.chart-ttl{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.04em;}
.chart-legend{display:flex;gap:14px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.leg-dot{width:8px;height:8px;border-radius:50%;}
canvas{display:block;width:100%;}

/* ── AI PANEL ── */
.ai-panel{background:var(--ai-bg);border:1.5px solid var(--ai-bd);border-radius:var(--rl);margin-bottom:20px;overflow:hidden;box-shadow:var(--sh);}
.ai-panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:linear-gradient(135deg,#ede9fe,var(--ai-bg));border-bottom:1px solid var(--ai-bd);}
.ai-panel-title{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--ai-text);}
.ai-star{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--ai),#a855f7);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(124,58,237,.3);}
.ai-star svg{width:16px;height:16px;fill:white;}
.ai-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:linear-gradient(135deg,var(--ai),#a855f7);color:white;letter-spacing:.06em;}
.ai-panel-body{padding:20px;}
.ai-generating{display:flex;align-items:center;gap:14px;padding:24px 20px;}
.ai-dots{display:flex;gap:6px;}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--ai);animation:bounce 1.2s infinite;}
.ai-dot:nth-child(2){animation-delay:.2s;}
.ai-dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
.ai-gen-text{font-size:13px;color:var(--ai-text);font-weight:500;}
.ai-section{margin-bottom:22px;}
.ai-section:last-child{margin-bottom:0;}
.ai-section-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ai-text);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--ai-bd);}
.ai-section-icon{font-size:15px;}
.issue-list{display:grid;gap:10px;}
.issue-card{background:white;border:1px solid var(--ai-bd);border-radius:var(--r);padding:14px 16px;border-left:4px solid var(--ai);}
.issue-card-title{font-size:14px;font-weight:700;color:var(--ai-text);margin-bottom:6px;}
.issue-card-body{font-size:13px;color:var(--text2);line-height:1.75;}
.issue-card-evidence{margin-top:10px;padding:8px 12px;background:var(--ai-bg);border-radius:var(--r);font-size:12px;color:var(--text3);border-left:3px solid var(--ai-bd);font-style:italic;line-height:1.6;}
.ws-question{background:white;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;}
.ws-q-num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--ai),#a855f7);color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.ws-q-text{font-size:13px;color:var(--text);line-height:1.7;font-weight:500;}
.ws-q-intent{font-size:12px;color:var(--text3);margin-top:4px;line-height:1.5;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.summary-item{background:white;border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;}
.summary-item-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.summary-item-text{font-size:13px;color:var(--text2);line-height:1.7;}
.ai-error{padding:14px;background:#fff5f5;border:1px solid #fcccc8;border-radius:var(--r);font-size:13px;color:#c0392b;}

/* ── SESSION MEMO ── */
.session-panel{background:var(--session-bg);border:1.5px solid var(--session-bd);border-radius:var(--rl);margin-bottom:20px;overflow:hidden;box-shadow:var(--sh);}
.session-panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:linear-gradient(135deg,#ccfbf1,var(--session-bg));border-bottom:1px solid var(--session-bd);}
.session-panel-title{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--session);}
.session-icon-wrap{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--session),#0d9488);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(15,118,110,.3);}
.session-icon-wrap svg{width:16px;height:16px;fill:white;}
.session-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--session);color:white;letter-spacing:.06em;}
.session-body{padding:20px;}

/* Session history list */
.session-history{margin-top:4px;}
.session-item{background:white;border:1px solid var(--session-bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:box-shadow .18s;}
.session-item:hover{box-shadow:var(--sh2);}
.session-item-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;transition:background .16s;}
.session-item-head:hover{background:var(--session-bg);}
.session-item-left{display:flex;align-items:center;gap:10px;}
.session-item-dot{width:10px;height:10px;border-radius:50%;background:var(--session);flex-shrink:0;}
.session-item-date{font-size:13px;font-weight:700;color:var(--text);}
.session-item-theme{font-size:12px;color:var(--text3);margin-left:4px;}
.session-item-actions{display:flex;gap:6px;}
.session-item-body{padding:0 16px 16px;display:none;}
.session-item-body.open{display:block;}

/* ══ STATE ══ */
let CU=null,PAGE='today',COACH_CID='c1',CYC=0,SESSION_TAB='history',AI_CACHE={},RPT_CACHE={};
const TODAY=new Date().toISOString().slice(0,10);

// スプレッドシート連携URL（設定後にここを書き換える）
let GAS_URL = localStorage.getItem('mindlog_gas_url') || '';

// ランタイムのクライアントデータキャッシュ
let CLIENTS = {};

/* ══ GAS通信 ══ */
async function gasCall(action, body={}) {
  if (!GAS_URL) throw new Error('GAS_URL未設定');
  const token = CU?.token || '';
  const url = `${GAS_URL}?action=${action}&token=${encodeURIComponent(token)}`;
  const res = await fetch(url, {
    method: 'POST',
    body: JSON.stringify({ action, token, ...body }),
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'サーバーエラー');
  return data;
}

/* ══ AUTH ══ */
function ql(id,p){document.getElementById('li').value=id;document.getElementById('lp').value=p;}

async function doLogin(){
  const uid = document.getElementById('li').value.trim();
  const pass = document.getElementById('lp').value;
  if (!uid||!pass) return;

  // GAS URL未設定ならデモモードで動作
  if (!GAS_URL) {
    demoLogin(uid, pass);
    return;
  }

  showLoginLoading(true);
  try {
    const data = await fetch(`${GAS_URL}?action=login&token=_`, {
      method:'POST',
      body: JSON.stringify({ action:'login', token:'_', uid, pass })
    }).then(r=>r.json());

    if (!data.ok) {
      document.getElementById('lerr').textContent = data.error || 'ログインに失敗しました';
      document.getElementById('lerr').style.display='block';
      return;
    }
    document.getElementById('lerr').style.display='none';
    CU = { role: data.role, name: data.name, id: data.id||uid, token: data.token,
           sport: data.sport||'', theme: data.theme||'', next: data.next||'' };
    await bootApp();
  } catch(e) {
    document.getElementById('lerr').textContent = 'サーバーに接続できません。デモモードで起動します。';
    document.getElementById('lerr').style.display='block';
    setTimeout(()=>demoLogin(uid,pass), 1200);
  } finally {
    showLoginLoading(false);
  }
}

function showLoginLoading(on){
  const btn=document.querySelector('.login-submit');
  if(btn) btn.textContent = on ? '接続中…' : 'ログイン';
}

// デモ用ローカル認証（GAS未設定時）

  'coach':    {pass:'coach123', role:'coach',  name:'山田 明',  id:'coach'},
  'tanaka':   {pass:'pass123',  role:'client', name:'田中 蓮',  id:'tanaka', sport:'バスケットボール', theme:'試合中の集中力と感情のコントロール', next:'2026-06-01'},
  'sato':     {pass:'pass123',  role:'client', name:'佐藤 海斗',id:'sato',   sport:'水泳',             theme:'レース前の緊張マネジメント',         next:'2026-06-03'},
  'yamamoto': {pass:'pass123',  role:'client', name:'山本 彩',  id:'yamamoto',sport:'テニス',          theme:'自己評価のブレを小さくする',         next:'2026-06-05'},
};

function demoLogin(uid, pass){
  const a = DEMO_ACCOUNTS[uid];
  if (!a || a.pass !== pass) {
    document.getElementById('lerr').textContent='IDまたはパスワードが正しくありません';
    document.getElementById('lerr').style.display='block';
    return;
  }
  document.getElementById('lerr').style.display='none';
  CU = { ...a, token: btoa(uid+':'+pass), demo: true };
  bootApp();
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('screen-login').style.display!=='none')doLogin();});

function doLogout(){
  CU=null; CLIENTS={};
  document.getElementById('screen-app').style.display='none';
  document.getElementById('screen-login').style.display='flex';
  document.getElementById('li').value='';
  document.getElementById('lp').value='';

/* ══ BOOT ══ */
async function bootApp(){
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-app').style.display='block';

  if(CU.role==='coach'){
    await loadClientList();
    if(Object.keys(CLIENTS).length>0) COACH_CID=Object.keys(CLIENTS)[0];
  } else {
    // クライアントは自分のデータだけ
    if(!CLIENTS[CU.id]) CLIENTS[CU.id]={name:CU.name,sport:CU.sport||'',theme:CU.theme||'',next:CU.next||'',entries:[],sessions:[]};
    await loadClientData(CU.id);
  }
  initApp();
}

// クライアント一覧だけ取得（データは取らない）
async function loadClientList(){
  if(CU.demo){
    ['tanaka','sato','yamamoto'].forEach(uid=>{
      const a=DEMO_ACCOUNTS[uid];
      CLIENTS[uid]={name:a.name,sport:a.sport,theme:a.theme,next:a.next,entries:mkDemoEntries(uid),sessions:mkDemoSessions(uid),loaded:true};
    });
    return;
  }
  try{
    const data=await gasCall('getClients');
    for(const c of data.clients){
      CLIENTS[c.id]={name:c.name,sport:c.sport,theme:c.theme,next:c.next,entries:[],sessions:[],loaded:false};
    }
  }catch(e){ toast('クライアント一覧の取得に失敗: '+e.message); }
}

// 1クライアント分だけ取得（遅延ロード）
async function loadClientData(cid){
  if(CU.demo) return;
  if(CLIENTS[cid]?.loaded) return; // 取得済みならスキップ
  try{
    const eRes=await gasCall('getEntries',{clientId:cid});
    if(!CLIENTS[cid]) CLIENTS[cid]={name:'',sport:'',theme:'',next:'',entries:[],sessions:[],loaded:false};
    CLIENTS[cid].entries=eRes.entries||[];
    const sRes=await gasCall('getSessions',{clientId:cid});
    CLIENTS[cid].sessions=sRes.sessions||[];
    CLIENTS[cid].loaded=true;
  }catch(e){ console.error('loadClientData:',e); }
}

/* ══ データ保存（GAS or ローカル） ══ */
async function persistEntry(cid, entry){
  if (CU.demo) return; // デモはメモリのみ
  try { await gasCall('saveEntry', { clientId: cid, entry }); } catch(e) { toast('保存エラー: '+e.message); }
}
async function persistSession(cid, session){
  if (CU.demo) return;
  try { await gasCall('saveSession', { clientId: cid, session }); } catch(e) { toast('保存エラー: '+e.message); }
}
async function removeSession(cid, sessionId){
  if (CU.demo) return;
  try { await gasCall('deleteSession', { sessionId }); } catch(e) { toast('削除エラー: '+e.message); }
}

function go(p){
  PAGE=p;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.dataset.p===p));
  const m=document.getElementById('main');
  if(CU.role==='client'){
    const cdata = CLIENTS[CU.id] || {name:CU.name,sport:CU.sport,theme:CU.theme,next:CU.next,entries:[],sessions:[]};
    if(p==='today') pgClientToday(m, cdata);
    else if(p==='timeline') pgTimeline(m, cdata);
    else pgGraph(m,false);
  } else {
    if(p==='records') pgCoach(m);
    else if(p==='sessions') pgSessions(m);
    else if(p==='ai') pgAI(m);
    else if(p==='export') pgExport(m);
    else if(p==='settings') pgSettings(m);
    else pgGraph(m,true);
  }
}

/* ══ UTIL ══ */
function fmt(d){return new Date(d+'T00:00:00').toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});}
function emo(v){return['','😔','😟','😕','😐','😐','🙂','😊','😄','🤩','🔥'][v]||'😐';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function toggleEC(id){document.getElementById(id)?.classList.toggle('collapsed');}
function toggleSI(id){const b=document.getElementById(id);if(b)b.classList.toggle('open');}

/* ══ CLIENT TODAY ══ */
function pgClientToday(m, cdata){
  if(!cdata) cdata = CLIENTS[CU.id]||{name:CU.name,sport:CU.sport||'',theme:CU.theme||'',next:CU.next||'',entries:[],sessions:[]};
  const days=Math.max(0,Math.ceil((new Date(cdata.next||'2099-01-01')-new Date())/86400000));
  const entry=cdata.entries.find(e=>e.date===TODAY)||{},hasMorn=!!entry.m?.goal,hasEve=!!(entry.e?.fact||entry.e?.interp);
  const C=2*Math.PI*26,off=C*(1-Math.min(1,Math.max(0,1-days/14)));
  m.innerHTML=`<div class="ph"><div><div class="ph-title">今日の記録</div><div class="ph-sub">${new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</div></div><div style="text-align:center"><svg class="ring-svg" width="66" height="66" viewBox="0 0 66 66"><circle class="ring-bg" cx="33" cy="33" r="26"/><circle class="ring-fg" cx="33" cy="33" r="26" stroke-dasharray="${C}" stroke-dashoffset="${off}"/><text x="33" y="30" text-anchor="middle" class="ring-days-text">${days}</text><text x="33" y="41" text-anchor="middle" class="ring-unit-text">日後</text></svg><div class="ring-caption">次回セッション</div></div></div>
<div class="theme-box"><div class="theme-icon"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14 2 9.27l6.91-1.01z"/></svg></div><div><div class="theme-label">今期のテーマ</div><div class="theme-text">${cdata.theme||'—'}</div></div></div>
<div class="card"><div class="card-head"><div class="card-head-title"><div class="card-dot" style="background:var(--morning)"></div>朝イチの記録</div>${hasMorn?'<span class="badge badge-done">✓ 記録済み</span>':''}</div><div class="card-body">${hasMorn?roMorn(entry.m):formMorn()}</div></div>
<div class="card"><div class="card-head"><div class="card-head-title"><div class="card-dot" style="background:var(--evening)"></div>夜の振り返り</div>${hasEve?'<span class="badge badge-done">✓ 記録済み</span>':''}</div><div class="card-body">${hasEve?roEve(entry.e):formEve()}</div></div>`;
  if(!hasMorn)updEmo('ms','me','mv');
  if(!hasEve)updEmo('es','ee','ev');
}
function formMorn(){return`<div class="field"><div class="fl" style="color:var(--morning)">今日の目標</div><div class="fl-hint">今日一番フォーカスしたいことは何？</div><textarea id="mg" rows="2" class="f-morning" placeholder="例：練習でシュートフォームの安定に集中する"></textarea></div><div class="field"><div class="fl" style="color:var(--morning)">そのために何をするか</div><div class="fl-hint">具体的な行動・準備を書く。</div><textarea id="mp" rows="2" class="f-morning" placeholder="例：イメトレ10分後、入念にウォームアップ"></textarea></div><div class="mood-row"><span class="mood-label-txt">朝の気分</span><span class="mood-emoji" id="me">🙂</span><div class="mood-track"><input type="range" id="ms" min="1" max="10" value="6" style="accent-color:var(--morning)" oninput="updEmo('ms','me','mv')"></div><span class="mood-val" id="mv">6</span></div><div class="btn-row"><button class="btn btn-morning" onclick="saveMorn()">朝の記録を保存</button></div>`;}
function formEve(){return`<div class="field"><div class="fl" style="color:var(--fact-c)">事実・出来事</div><div class="fl-hint">数字・行動・出来事を客観的に。</div><textarea id="ef" rows="3" class="f-fact" placeholder="例：午前練習90分。シュート成功率58%。"></textarea></div><div class="divider"></div><div class="field"><div class="fl" style="color:var(--interp-c)">解釈・感情・気づき</div><div class="fl-hint">その事実をどう感じ、どう解釈したか。</div><textarea id="ei" rows="3" class="f-interp" placeholder="例：指摘後すぐ切り替えられた。後半に焦りが出た。"></textarea></div><div class="mood-row"><span class="mood-label-txt">夜のメンタル</span><span class="mood-emoji" id="ee">🙂</span><div class="mood-track"><input type="range" id="es" min="1" max="10" value="6" oninput="updEmo('es','ee','ev')"></div><span class="mood-val" id="ev">6</span></div><div class="btn-row"><button class="btn btn-primary" onclick="saveEve()">夜の記録を保存</button></div>`;}
function roMorn(mn){return`<div class="es"><div class="es-label" style="color:var(--morning)">今日の目標</div><div class="es-text">${mn.goal}</div></div><div class="es"><div class="es-label" style="color:var(--morning)">行動計画</div><div class="es-text">${mn.plan||'—'}</div></div><div class="data-row"><span>朝の気分</span><span>${emo(mn.mood)}</span><div class="mini-bar"><div class="mini-fill" style="width:${mn.mood*10}%"></div></div><span>${mn.mood}/10</span></div>`;}
function roEve(ev){return`<div class="es"><div class="es-label" style="color:var(--fact-c)">事実・出来事</div><div class="es-text">${ev.fact||'—'}</div></div><div class="es"><div class="es-label" style="color:var(--interp-c)">解釈・感情</div><div class="es-text">${ev.interp||'—'}</div></div><div class="data-row"><span>夜のメンタル</span><span>${emo(ev.mood)}</span><div class="mini-bar"><div class="mini-fill" style="width:${ev.mood*10}%"></div></div><span>${ev.mood}/10</span></div>`;}
function updEmo(sid,eid,vid){const v=document.getElementById(sid)?.value;if(!v)return;if(document.getElementById(eid))document.getElementById(eid).textContent=emo(parseInt(v));if(document.getElementById(vid))document.getElementById(vid).textContent=v;}
async function saveMorn(){
  const goal=document.getElementById('mg')?.value.trim(),plan=document.getElementById('mp')?.value.trim(),mood=parseInt(document.getElementById('ms')?.value||6);
  if(!goal){toast('今日の目標を入力してください');return;}
  if(!CLIENTS[CU.id])CLIENTS[CU.id]={name:CU.name,sport:CU.sport||'',theme:CU.theme||'',next:CU.next||'',entries:[],sessions:[]};
  const c=CLIENTS[CU.id];let e=c.entries.find(x=>x.date===TODAY);
  if(!e){e={date:TODAY};c.entries.push(e);}
  e.m={goal,plan,mood};
  await persistEntry(CU.id,e);
  toast('朝の記録を保存しました ✓');pgClientToday(document.getElementById('main'),c);
}
async function saveEve(){
  const fact=document.getElementById('ef')?.value.trim(),interp=document.getElementById('ei')?.value.trim(),mood=parseInt(document.getElementById('es')?.value||6);
  if(!fact&&!interp){toast('何か記録してみましょう');return;}
  if(!CLIENTS[CU.id])CLIENTS[CU.id]={name:CU.name,sport:CU.sport||'',theme:CU.theme||'',next:CU.next||'',entries:[],sessions:[]};
  const c=CLIENTS[CU.id];let e=c.entries.find(x=>x.date===TODAY);
  if(!e){e={date:TODAY};c.entries.push(e);}
  e.e={fact,interp,mood};if(!e.note)e.note='';
  await persistEntry(CU.id,e);
  toast('夜の記録を保存しました ✓');pgClientToday(document.getElementById('main'),c);
}

function saveNote(cid,date,val){

async function saveSession(){
  const date=document.getElementById('ns-date').value.trim();
  const theme=document.getElementById('ns-theme').value.trim();
  const memo=document.getElementById('ns-memo').value.trim();
  if(!memo){toast('セッションメモを入力してください');return;}
  const s={id:Date.now().toString(),date:date||TODAY,theme,memo,aiCache:null,extraNote:''};

async function deleteSession(id){
  if(!confirm('このセッションメモを削除しますか？'))return;
  CLIENTS[COACH_CID].sessions=CLIENTS[COACH_CID].sessions.filter(s=>s.id!==id);
  await removeSession(COACH_CID,id);
  renderSessionList();toast('削除しました');
}
function updateSessionNote(id,val){
  const s=CLIENTS[COACH_CID].sessions.find(x=>x.id===id);
  if(s){s.extraNote=val;persistSession(COACH_CID,s);}
}

function generateSessionAI(sessionId){
  const c=CLIENTS[COACH_CID];
  const s=c.sessions.find(x=>x.id===sessionId);
  if(!s)return;
  const area=document.getElementById(`si-ai-${sessionId}`);
  if(!area)return;

  // ローディング演出
  area.innerHTML=`<div class="ai-generating"><div class="ai-dots"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div><div class="ai-gen-text">このセッションを分析中…</div></div>`;

  setTimeout(()=>{
    // クライアントとセッション番号に応じてモックを選択
    const mocks=SESSION_AI_MOCKS[COACH_CID]||SESSION_AI_MOCKS['c1'];
    const idx=c.sessions.findIndex(x=>x.id===sessionId);
    const mock=mocks[idx%mocks.length]||mocks[0];
    s.aiCache=mock;
    area.innerHTML=renderSessionAIResult(mock);
  },1200);
}

function generatePattern(force){
  const c=CLIENTS[COACH_CID];
  if(!c.sessions.length){toast('セッションメモがまだありません');return;}
  if(RPT_CACHE[COACH_CID]&&!force){document.getElementById('pattern-result').innerHTML=renderPattern(RPT_CACHE[COACH_CID]);return;}
  const btn=document.getElementById('pattern-btn');
  if(btn)btn.disabled=true;
  document.getElementById('pattern-result').innerHTML=`<div class="ai-generating"><div class="ai-dots"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div><div class="ai-gen-text">全セッションを横断分析しています…</div></div>`;

  setTimeout(()=>{
    const mock=PATTERN_MOCKS[COACH_CID]||PATTERN_MOCKS['c1'];
    RPT_CACHE[COACH_CID]=mock;
    document.getElementById('pattern-result').innerHTML=renderPattern(mock);
    if(btn){btn.disabled=false;btn.textContent='再生成';}
  },1800);
}

function renderPattern(d){
  const patterns=(d.recurring_patterns||[]).map(p=>`
    <div class="pattern-card">
      <div class="pattern-card-title">${p.title}</div>
      <div class="pattern-card-text">${p.description}</div>
      ${p.sessions?`<div class="pattern-card-sessions">📌 ${p.sessions}で確認</div>`:''}
      ${p.coaching_point?`<div style="margin-top:8px;padding:7px 10px;background:var(--ai-bg);border-radius:var(--r);font-size:12px;color:var(--ai-text)">💡 ${p.coaching_point}</div>`:''}
    </div>`).join('');
  const growths=(d.growth_points||[]).map(g=>`<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px"><span style="color:var(--g500);font-size:16px;flex-shrink:0">✓</span><span style="font-size:13px;color:var(--text2);line-height:1.7">${g}</span></div>`).join('');
  const qs=(d.next_session_prep?.questions||[]).map((q,i)=>`<div class="ws-question"><div class="ws-q-num">${i+1}</div><div class="ws-q-text">${q}</div></div>`).join('');

  return`
<div class="ai-section">
  <div class="ai-section-title"><span class="ai-section-icon">🌱</span>全体の変化・成長の軌跡</div>
  <div class="report-item"><div class="report-item-text">${d.overall_arc||'—'}</div></div>
</div>
<div class="ai-section">
  <div class="ai-section-title"><span class="ai-section-icon">🔄</span>繰り返し見られるパターン</div>
  <div class="issue-list">${patterns}</div>
</div>
<div class="ai-section">
  <div class="ai-section-title"><span class="ai-section-icon">✅</span>成長・変化のポイント</div>
  <div style="background:white;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px">${growths}</div>
</div>
${d.core_theme?`<div class="ai-section"><div class="ai-section-title"><span class="ai-section-icon">🎯</span>本質的なテーマ</div><div class="report-item"><div class="report-item-text">${d.core_theme}</div></div></div>`:''}
<div class="ai-section">
  <div class="ai-section-title"><span class="ai-section-icon">📝</span>次回セッション準備</div>
  ${d.next_session_prep?.hypothesis?`<div class="report-item" style="margin-bottom:12px"><div class="report-item-label">仮説</div><div class="report-item-text">${d.next_session_prep.hypothesis}</div></div>`:''}
  ${qs}

</div>

function drawGraph(data){
  const cv=document.getElementById('gc');if(!cv)return;
  const W=cv.offsetWidth||680,H=200;cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d'),P={t:16,r:16,b:32,l:32},cw=W-P.l-P.r,ch=H-P.t-P.b;
  ctx.clearRect(0,0,W,H);
  for(let i=1;i<=4;i++){const y=P.t+ch-(ch*i*2/10);ctx.strokeStyle='rgba(0,0,0,.055)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cw,y);ctx.stroke();ctx.fillStyle='rgba(0,0,0,.3)';ctx.font='10px DM Mono,monospace';ctx.textAlign='right';ctx.fillText(i*2,P.l-5,y+3);}
  if(!data.length)return;
  const xs=cw/Math.max(data.length-1,1);
  function line(vals,color){const pts=vals.map((v,i)=>[P.l+i*xs,P.t+ch-ch*(v-1)/9]);if(pts.length<1)return;ctx.beginPath();ctx.moveTo(pts[0][0],P.t+ch);pts.forEach(([x,y])=>ctx.lineTo(x,y));ctx.lineTo(pts[pts.length-1][0],P.t+ch);ctx.closePath();const g=ctx.createLinearGradient(0,P.t,0,P.t+ch);g.addColorStop(0,color+'40');g.addColorStop(1,color+'00');ctx.fillStyle=g;ctx.fill();if(pts.length>1){ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';pts.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));ctx.stroke();}pts.forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,4.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();});}
  const mv=data.map(e=>e.m?.mood||null),ev=data.map(e=>e.e?.mood||null);
  const mf=mv.map((v,i)=>v||ev[i]||5),ef=ev.map((v,i)=>v||mv[i]||5);
  if(mv.some(v=>v))line(mf,'#e07c2a');if(ev.some(v=>v))line(ef,'#2a7ec0');
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.font='9px DM Mono,monospace';ctx.textAlign='center';
  data.forEach((e,i)=>{if(data.length<=7||i%2===0)ctx.fillText(e.date.slice(5),P.l+i*xs,H-6);});
}

/* ── CSV生成ユーティリティ ── */
function escCSV(v){
  if(v==null)return'';
  const s=String(v).replace(/\r?\n/g,' ');
  return s.includes(',')||s.includes('"')||s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
}
function buildCSVString(headers,rows){
  return[headers.map(escCSV).join(','),...rows.map(r=>r.map(escCSV).join(','))].join('\r\n');
}
function triggerDownload(csvStr,filename){
  const bom='\uFEFF'; // BOM for Excel/Sheets Japanese
  const blob=new Blob([bom+csvStr],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

    (prep.worksheet||[]).forEach((q,i)=>{
      rows.push([today,'ワークシート質問',`Q${i+1}`,q.question||'',q.intent||'','','']);
    });
  }

  // パターン分析AI
  const ptn=RPT_CACHE[cid];
  if(ptn){
    rows.push([today,'パターン分析','全体の軌跡',ptn.overall_arc||'','','','']);
    rows.push([today,'パターン分析','本質的テーマ',ptn.core_theme||'','','','']);
    (ptn.recurring_patterns||[]).forEach(p=>{
      rows.push([today,'繰り返しパターン',p.title||'',p.description||'',p.sessions||'',p.coaching_point||'','']);
    });
    (ptn.growth_points||[]).forEach((g,i)=>{
      rows.push([today,'成長ポイント',`${i+1}`,g,'','','']);
    });
    (ptn.next_session_prep?.questions||[]).forEach((q,i)=>{
      rows.push([today,'次回準備質問',`Q${i+1}`,q,'','','']);
    });
    if(ptn.next_session_prep?.hypothesis)
      rows.push([today,'次回準備','仮説',ptn.next_session_prep.hypothesis,'','','']);
    if(ptn.next_session_prep?.caution)
      rows.push([today,'次回準備','注意点',ptn.next_session_prep.caution,'','','']);
    if(ptn.client_report_summary)
      rows.push([today,'クライアントレポート','要約',ptn.client_report_summary,'','','']);
  }

  const headers=['生成日','種別','項目','内容','補足1','補足2','補足3'];
  return buildCSVString(headers,rows);
}

/* ── ダウンロード実行 ── */
function downloadCSV(type,cid){
  const c=CLIENTS[cid];
  const name=c.name.replace(/\s/g,'_');
  const today=new Date().toISOString().slice(0,10);

  if(type==='entries'){
    triggerDownload(buildEntriesCSV(cid),`MindLog_日々の記録_${name}_${today}.csv`);
    toast('日々の記録をダウンロードしました ✓');
  } else if(type==='sessions'){
    triggerDownload(buildSessionsCSV(cid),`MindLog_セッションメモ_${name}_${today}.csv`);
    toast('セッションメモをダウンロードしました ✓');
  } else if(type==='ai'){
    const csv=buildAICSV(cid);
    if(!csv.split('\r\n').length>1){toast('AI分析データがありません');return;}
    triggerDownload(csv,`MindLog_AI分析_${name}_${today}.csv`);
    toast('AI分析結果をダウンロードしました ✓');
  }
}

function downloadAllCSV(cid){
  const c=CLIENTS[cid];
  const name=c.name.replace(/\s/g,'_');
  const today=new Date().toISOString().slice(0,10);
  // 3ファイルを順番にダウンロード（間隔をあけて）
  triggerDownload(buildEntriesCSV(cid),`MindLog_日々の記録_${name}_${today}.csv`);
  setTimeout(()=>triggerDownload(buildSessionsCSV(cid),`MindLog_セッションメモ_${name}_${today}.csv`),400);
  setTimeout(()=>{
    const aiCsv=buildAICSV(cid);
    if(aiCsv.split('\r\n').length>1)
      triggerDownload(aiCsv,`MindLog_AI分析_${name}_${today}.csv`);
  },800);
  toast('3ファイルをダウンロードします ✓');
}

window.addEventListener('resize',()=>{if(PAGE==='graph'){const cid=CU?.role==='client'?CU.id:COACH_CID;if(cid)drawGraph((getCycles(CLIENTS[cid].entries)[CYC]||[])); }});
</script>
